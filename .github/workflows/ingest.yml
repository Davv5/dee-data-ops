# Manual GHL emergency-backstop ingest workflow.
#
# Track W (2026-04-22): GHL ingest moved to Cloud Run Jobs + Cloud Scheduler
# for sub-5-min freshness. This workflow is retained as the manual-dispatch
# emergency backstop — flip to it if Cloud Scheduler is paused / Cloud Run Jobs
# are degraded. No `schedule:` trigger — the cron used to fire only Fanbasis,
# and Fanbasis ingestion was consolidated into `services/bq-ingest/` (PR #102,
# 2026-04-28). See `1-raw-landing/fanbasis/README.md` (tombstone) for the
# new location.
#
# Secrets model (post Track J Secret Manager migration, 2026-04-20):
#
#   Stored in GCP Secret Manager (project `dee-data-ops-prod`):
#     ghl-api-key       — GHL v2 / LeadConnector Private Integration Token
#     ghl-location-id   — GHL location (sub-account) ID
#   Fetched at runtime by 1-raw-landing/ghl/extract.py via
#   google-cloud-secret-manager. The GitHub Actions SA
#   (secrets.GCP_SA_KEY) must hold `roles/secretmanager.secretAccessor` on
#   both secrets.
#
#   Remaining GitHub repo secret (Settings → Secrets → Actions):
#     GCP_SA_KEY        — JSON keyfile for the ingest/deploy service account (NOT base64; paste the raw JSON)
#
# Rollback path: to revert GHL to GHA cron, restore a `schedule:` block here
# and pause the Cloud Scheduler jobs:
# `gcloud scheduler jobs pause ghl-hot --location=us-central1`.
# See 1-raw-landing/deploy/ghl-extractor/terraform/README.md for full rollback steps.

name: Ingest

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # for google-github-actions/auth if we switch to WIF later

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Do NOT re-add `fanbasis` here — Fanbasis ingestion was consolidated
        # into `services/bq-ingest/sources/fanbasis/` on 2026-04-28 (PR #102).
        # See `1-raw-landing/fanbasis/README.md` (tombstone) for the new home.
        source: [ghl]

    env:
      GCP_PROJECT_ID_DEV: dee-data-ops
      # Signals to 1-raw-landing/*/extract.py that secrets should be fetched from
      # Secret Manager (via _load_secret in 1-raw-landing/ghl/extract.py) rather
      # than read from env vars. Unset in local dev so .env values apply.
      GCP_SECRET_MANAGER_PROJECT: dee-data-ops-prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: 1-raw-landing/${{ matrix.source }}/requirements.txt

      - name: Install deps
        run: pip install -r 1-raw-landing/${{ matrix.source }}/requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run extractor
        # Track W: GHL production cron runs on Cloud Run Jobs + Cloud Scheduler.
        # This step is the workflow_dispatch-only emergency backstop.
        run: python 1-raw-landing/${{ matrix.source }}/extract.py

      - name: Slack notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔴 Ingest (${{ matrix.source }}) failed on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Ingest* (`${{ matrix.source }}`) failed\n• Branch: `${{ github.ref_name }}`\n• Run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\n• Commit: `${{ github.sha }}`"
                  }
                }
              ]
            }
