# Daily ingestion for sources not covered by Fivetran (GHL, Fanbasis).
#
# Runs at 06:00 UTC (≈02:00 ET) so dashboards are fresh by morning US-East.
# Also available via workflow_dispatch for on-demand reruns.
#
# Secrets model (post Track J Secret Manager migration, 2026-04-20):
#
#   Stored in GCP Secret Manager (project `dee-data-ops-prod`):
#     ghl-api-key       — GHL v2 / LeadConnector Private Integration Token
#     ghl-location-id   — GHL location (sub-account) ID
#   Fetched at runtime by ingestion/ghl/extract.py via
#   google-cloud-secret-manager. The GitHub Actions SA
#   (secrets.GCP_SA_KEY) must hold `roles/secretmanager.secretAccessor` on
#   both secrets.
#
#   Remaining GitHub repo secrets (Settings → Secrets → Actions):
#     GCP_SA_KEY        — JSON keyfile for the ingest/deploy service account (NOT base64; paste the raw JSON)
#     FANBASIS_API_KEY  — Fanbasis API token (week-0-deferred source; migration to SM scoped separately)

name: Ingest

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # for google-github-actions/auth if we switch to WIF later

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: [ghl, fanbasis]

    env:
      GCP_PROJECT_ID_DEV: dee-data-ops
      # Signals to ingestion/*/extract.py that secrets should be fetched from
      # Secret Manager (via _load_secret in ingestion/ghl/extract.py) rather
      # than read from env vars. Unset in local dev so .env values apply.
      GCP_SECRET_MANAGER_PROJECT: dee-data-ops-prod
      FANBASIS_API_KEY: ${{ secrets.FANBASIS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ingestion/${{ matrix.source }}/requirements.txt

      - name: Install deps
        run: pip install -r ingestion/${{ matrix.source }}/requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run extractor
        run: python ingestion/${{ matrix.source }}/extract.py

      - name: Slack notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔴 Ingest (${{ matrix.source }}) failed on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Ingest* (`${{ matrix.source }}`) failed\n• Branch: `${{ github.ref_name }}`\n• Run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\n• Commit: `${{ github.sha }}`"
                  }
                }
              ]
            }
