# dbt Nightly — full refresh of prod, plus snapshot capture and
# source-freshness check.
#
# Runs at 08:00 UTC (~03:00 ET winter / 04:00 ET summer) so dashboards
# are fresh by the US-East morning. Ordered:
#   1. dbt source freshness  (warn-only — a stale source shouldn't
#      fail the whole nightly, but should surface in logs)
#   2. dbt snapshot          (capture SCDs before downstream rebuild)
#   3. dbt build             (full rebuild of staging + warehouse + marts)
#
# Also exposed via workflow_dispatch for on-demand reruns.
#
# Required repo secrets:
#   GCP_SA_KEY_PROD — same prod service-account keyfile as dbt-deploy.yml

name: dbt Nightly

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: dbt-nightly-prod
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: .
      GCP_PROJECT_ID_PROD: project-41542e21-470f-4589-96d
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Authenticate to GCP (prod)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - name: dbt deps
        env:
          BQ_KEYFILE_PATH_PROD: ${{ steps.auth.outputs.credentials_file_path }}
        run: cd 2-dbt && dbt deps

      - name: dbt source freshness (warn-only)
        env:
          BQ_KEYFILE_PATH_PROD: ${{ steps.auth.outputs.credentials_file_path }}
        run: cd 2-dbt && dbt source freshness --target prod || true

      - name: dbt snapshot
        env:
          BQ_KEYFILE_PATH_PROD: ${{ steps.auth.outputs.credentials_file_path }}
        run: cd 2-dbt && dbt snapshot --target prod

      - name: dbt build (full refresh)
        env:
          BQ_KEYFILE_PATH_PROD: ${{ steps.auth.outputs.credentials_file_path }}
        run: cd 2-dbt && dbt build --target prod

      # Volume-monitor soft-alert: runs volume_drift test with --warn-error so
      # warn-severity becomes a non-zero exit; continue-on-error keeps the
      # workflow green, and the next step posts a Slack message if drift fired.
      - name: Volume drift check (soft-alert)
        id: volume_drift
        continue-on-error: true
        env:
          BQ_KEYFILE_PATH_PROD: ${{ steps.auth.outputs.credentials_file_path }}
        run: cd 2-dbt && dbt test --select volume_drift --target prod --warn-error

      - name: Slack notify on volume drift
        if: steps.volume_drift.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "⚠️ Volume drift >10% detected in nightly",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Volume drift* — a mart row-count moved >10% vs prior day.\n• Run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\n• Investigate `mart_volume_history` in BQ for the offending mart + date."
                  }
                }
              ]
            }

      - name: Slack notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔴 ${{ github.workflow }} failed on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.workflow }}* failed\n• Branch: `${{ github.ref_name }}`\n• Run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\n• Commit: `${{ github.sha }}`"
                  }
                }
              ]
            }
