name: Publish dbt docs

# Builds `dbt docs` against prod on every push to main that touches 2-dbt/,
# then publishes 2-dbt/target/ to the gh-pages branch. Served at
# https://davv5.github.io/dee-data-ops/ (GitHub Pages source: gh-pages root).
#
# Auth model: Workload Identity Federation (WIF) to
# `sa-transform@project-41542e21-470f-4589-96d.iam.gserviceaccount.com`.
# Docs generation only executes read metadata queries
# (`dbt docs generate` compiles the manifest + catalog from
# information_schema). Migrated from `credentials_json` 2026-04-29 with
# the prod auth cutover.

on:
  push:
    branches: [main]
    paths: ['2-dbt/**']
  workflow_dispatch:

permissions:
  contents: write  # peaceiris/actions-gh-pages pushes to gh-pages
  id-token: write  # for google-github-actions/auth WIF

concurrency:
  group: dbt-docs
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Authenticate to GCP (via WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/535993952532/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
          service_account: sa-transform@project-41542e21-470f-4589-96d.iam.gserviceaccount.com

      - name: dbt deps
        working-directory: 2-dbt
        run: dbt deps

      - name: dbt docs generate
        working-directory: 2-dbt
        run: dbt docs generate --target prod

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./2-dbt/target
