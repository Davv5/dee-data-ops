name: 'dee_data_ops'
version: '1.0.0'

profile: 'dee_data_ops'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# Layer-level configs. Schema assignments are routed through the
# generate_schema_name macro: prod → these names as-is, dev/ci →
# consolidated into target.schema (dev_<user> or ci).
#
# Y1 cutover (2026-04-29): schema names capitalized to match the
# consolidated project's actual datasets (STG, Core, Marts) — pre-existing
# from bq-ingest's marts.sql / Core SQL writers. dbt-built tables coexist
# in these datasets alongside bq-ingest-written tables (different table
# names, no conflict).
models:
  dee_data_ops:
    staging:
      +materialized: view
      +schema: STG
    warehouse:
      +materialized: table
      +schema: Core
      dimensions:
        +schema: Core
      facts:
        +schema: Core
      bridges:
        +schema: Core
    marts:
      +materialized: table
      +schema: Marts

seeds:
  dee_data_ops:
    +schema: STG
    ghl_sdr_roster:
      +quote_columns: false
    validation:
      +schema: STG

# Snapshots route to Core (the warehouse dataset) — SCD-Type-2 dim
# snapshots like `dim_ghl_users_scd2` already live there, so dbt
# snapshots are consistent with the existing convention.
snapshots:
  dee_data_ops:
    +target_schema: Core
