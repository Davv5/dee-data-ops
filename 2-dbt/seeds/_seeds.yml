version: 2

seeds:
  - name: lead_magnet_pipeline_taxonomy
    description: >
      Human-maintained taxonomy layer for GHL pipelines used by the
      lead_magnet_detail mart. The raw GHL pipeline name stays visible, while
      this seed adds a cleaned reporting name and separates true lead magnets
      from launch/event, waitlist, and sales/operating pipelines. It also adds
      `lead_magnet_offer_type`, a second axis for the creative/package format
      of the offer: prompts, templates, guides, lists, trainings, videos,
      giveaways, communities, waitlists, launches, and sales pipelines.
    config:
      column_types:
        pipeline_id: string
        pipeline_name: string
        lead_magnet_reporting_name: string
        lead_magnet_category: string
        lead_magnet_offer_type: string
        is_true_lead_magnet: boolean
        is_launch: boolean
        is_waitlist: boolean
        is_sales_pipeline: boolean
        include_in_lead_magnet_dashboard: boolean
        taxonomy_confidence: string
    columns:
      - name: pipeline_id
        description: GHL pipeline id; joins to `dim_pipeline_stages.pipeline_id`.
        tests:
          - unique
          - not_null
      - name: lead_magnet_category
        description: Business-facing pipeline class for lead-magnet reporting.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['true_lead_magnet', 'launch_event', 'waitlist', 'sales_operating_pipeline', 'internal_test_retired']
      - name: lead_magnet_reporting_name
        description: Clean dashboard label for the raw GHL pipeline.
        tests:
          - not_null
      - name: lead_magnet_offer_type
        description: Creative/package format of the offer for lead-magnet analysis.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['prompt_pack', 'template', 'guide_or_doc', 'resource_list', 'training_or_class', 'video_or_replay', 'giveaway', 'community', 'waitlist', 'sales_pipeline', 'launch_event', 'uncategorized']

  - name: ghl_sdr_roster
    description: >
      Human-maintained roster of GHL users with role assignments. GHL's built-in
      `role` and `type` fields are account/agency + user/admin (agency hierarchy),
      which is orthogonal to the functional role distinction the Speed-to-Lead metric
      needs. This seed is the source of truth for who counts as an SDR when attributing
      first outbound touch on a booking.

      Valid `role` values follow the 5-role taxonomy revealed by the Master Lead Sheet
      oracle (columns AZ–BD): SDR, Setter, Triager, DM_Setter, Closer. Plus Owner for
      the client/operator accounts and unknown for users awaiting manual confirmation.

      The Speed-to-Lead metric numerator filters `WHERE first_toucher.role = 'SDR'`
      at the mart layer (per .claude/rules/mart-naming.md). Other roles still appear
      in the warehouse (`fct_outreach` captures all roles) and in Page 2 attribution
      tiles, but only SDR touches count for the headline 5-min SLA metric.
    config:
      column_types:
        user_id: string
        first_name: string
        last_name: string
        email: string
        role: string
    columns:
      - name: user_id
        description: GHL user id — joins to raw_ghl.users.id / conversations.assignedTo / messages.userId.
        tests:
          - unique
          - not_null
      - name: role
        description: Functional role driving Speed-to-Lead attribution + v1.5 leaderboards.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SDR', 'Setter', 'Triager', 'DM_Setter', 'Closer', 'Owner', 'unknown']
