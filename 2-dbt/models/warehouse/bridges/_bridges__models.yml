version: 2

models:
  - name: bridge_stripe_payment_product_repair
    description: >
      Grain: one row per historical Stripe payment with a repaired product
      label. Repairs direct Stripe charges that lack invoice lines,
      descriptions, and metadata by using high-confidence nearby GHL
      opportunity context first, nearby Calendly booking context second, and
      amount-pattern fallback last. Downstream `fct_payments` only uses this
      bridge when source Stripe product fields are missing.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - source_platform
            - payment_id
    columns:
      - name: source_platform
        description: Always `stripe`.
        tests:
          - not_null
          - accepted_values:
              values:
                - stripe
      - name: payment_id
        description: Stripe charge/payment id.
        tests:
          - not_null
      - name: repaired_product
        description: Product label inferred for reporting.
        tests:
          - not_null
          - accepted_values:
              values:
                - Brand Scaling Blueprint
                - Mind of Dee Inner Circle
                - Rich Of Clothes
      - name: product_repair_source
        description: Evidence tier used for the repair.
        tests:
          - not_null
          - accepted_values:
              values:
                - ghl_pipeline_context
                - calendly_booking_context
                - stripe_amount_pattern
      - name: product_repair_confidence
        description: Confidence assigned to the repair rule.
        tests:
          - not_null
          - accepted_values:
              values:
                - high
                - medium
      - name: product_repair_note
        description: Human-readable reason for the repair.
      - name: context_id
        description: Native context id when the repair came from an opportunity or booking.
      - name: context_name
        description: Pipeline/event/amount context used by the repair.
      - name: context_detail
        description: Stage/currency context used by the repair.

  - name: bridge_identity_contact_payment
    description: >
      Grain: one row per `(source_platform, payment_id)`.
      PK: `(source_platform, payment_id)`.
      Deterministic 9-tier match between payments (Stripe + Fanbasis) and
      `dim_contacts`; best match picked via `qualify row_number() over
      (partition by source_platform, payment_id order by match_score desc)
      = 1`. Downstream: `fct_payments` left-joins on
      `(source_platform, payment_id)` to attach `contact_sk` + bridge
      metadata. See `_bridges__docs.md` for tier order, scoring, and
      rationale.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - source_platform
            - payment_id
    columns:
      - name: source_platform
        description: Originating system for the payment row — `stripe` or `fanbasis`.
        tests:
          - not_null
          - accepted_values:
              values:
                - stripe
                - fanbasis
      - name: payment_id
        description: >
          Native payment id (Stripe `charge_id` or Fanbasis `payment_id`).
          Component of the composite PK alongside `source_platform`.
        tests:
          - not_null
      - name: contact_sk
        description: >
          FK to `dim_contacts.contact_sk`. NULL when
          `match_method in ('billing_email_direct', 'unmatched')`.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: match_method
        description: >
          Which tier produced the match. Tier priority (and scores):
          `email_exact` (1.00), `phone_last10` (1.00),
          `email_canonical` (0.95), `stripe_customer_email` (0.90),
          `stripe_customer_phone` (0.90),
          `fanbasis_conversation_email` (0.88),
          `fanbasis_unique_crm_name` (0.82),
          `billing_email_direct` (0.80), `unmatched` (0.00).
        tests:
          - not_null
          - accepted_values:
              values:
                - email_exact
                - email_canonical
                - phone_last10
                - stripe_customer_email
                - stripe_customer_phone
                - fanbasis_conversation_email
                - fanbasis_unique_crm_name
                - billing_email_direct
                - unmatched
      - name: match_score
        description: Confidence score for the chosen tier. Range 0.00-1.00.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
              inclusive: true
      - name: bridge_status
        description: >
          Summary flag. `matched` when the payment resolves to a CRM contact;
          `payment_identity_only` when source identity exists but no CRM contact
          exists;
          `ambiguous_multi_candidate` when > 1 contact tied at the
          best score; `unmatched` otherwise.
        tests:
          - not_null
          - accepted_values:
              values:
                - matched
                - payment_identity_only
                - ambiguous_multi_candidate
                - unmatched
