version: 2

models:
  - name: fct_calls_booked
    description: >
      Grain: one row per Calendly booking event — the Speed-to-Lead
      denominator source. Source: `stg_calendly__events`. `contact_sk`
      resolves through `stg_calendly__event_invitees.invitee_email_norm`
      → `dim_contacts.email_norm`; bookings without a matching GHL
      contact resolve to NULL contact_sk (relationships test
      auto-excludes NULLs). `assigned_user_sk` + `pipeline_stage_sk`
      resolve via the most-recent GHL opportunity for the contact whose
      `opportunity_created_at <= booked_at` ("active opp at booking
      time") — *diagnostic* attribution only. The headline Speed-to-Lead
      numerator sources first-touch identity from
      `raw_ghl.conversations` / `fct_outreach`, independent of
      opportunity state. Bookings whose contact has no pre-booking
      opportunity resolve to NULL on both attribution SKs.
    columns:
      - name: booking_sk
        description: Surrogate key over Calendly `event_id`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable when the booking's invitee email doesn't match a GHL contact.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: assigned_user_sk
        description: >
          FK to `dim_users.user_sk`. Resolved via the most-recent GHL
          opportunity for the contact whose
          `opportunity_created_at <= booked_at`. NULL when the contact
          has no pre-booking opportunity. Diagnostic attribution only —
          not on the Speed-to-Lead numerator path.
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_sk
      - name: pipeline_stage_sk
        description: >
          FK to `dim_pipeline_stages.pipeline_stage_sk`. Resolved from
          the same active-opp-at-booking-time as `assigned_user_sk`.
          Nullable on the same condition.
        tests:
          - relationships:
              to: ref('dim_pipeline_stages')
              field: pipeline_stage_sk
      - name: booking_time_opportunity_id
        description: >
          GHL `opportunity_id` of the booking-time-active opp; canonical
          mart join axis. NULL when no pre-booking opp exists. NOT for
          current/latest-opp questions — see `fct_calls_booked__overview`
          for full rationale and the negative-space disclaimer.
        tests:
          - relationships:
              to: ref('stg_ghl__opportunities')
              field: opportunity_id
      - name: calendly_event_id
        description: Raw Calendly event id (`uri`). Natural key for traceability.
        tests:
          - not_null
      - name: booked_at
        description: >
          UTC timestamp the invitee confirmed the slot. Speed-to-Lead
          start clock.
        tests:
          - not_null
      - name: scheduled_for
        description: UTC timestamp the meeting is / was scheduled to start.
      - name: event_status
        description: Calendly event status (`active`, `canceled`, …).
      - name: cancelled_at
        description: UTC timestamp of cancellation when `event_status` is cancelled.

  - name: fct_outreach
    description: >
      Grain: one row per outbound human CALL/SMS. Source: bq-ingest-built
      `Core.fct_ghl_outbound_calls` (calls) + `Core.fct_ghl_conversations`
      (SMS), declared as sources in
      `2-dbt/models/warehouse/_core__sources.yml`. Repointed 2026-04-30 from
      the retired `STG.stg_ghl__messages` (which read from a permanently-
      empty view). SMS messages must belong to a conversation with at least
      one manual message (`stg_ghl__conversations.last_manual_message_at IS
      NOT NULL`) — the locked-metric exclusion lever for human vs automation.
      Outbound calls bypass the gate (inherently human). Cross-entity dedupe
      via QUALIFY ROW_NUMBER on (message_id, location_id) — GHL logs the
      same physical event in both `outbound_call_logs` and `conversations`
      entities, sharing the id; we keep one row per id, preferring the call
      representation. No role filter — per Track D the SDR filter moves to
      the mart so this fact is reusable across SDR / AE / Closer cuts.
    columns:
      - name: touch_sk
        description: Surrogate key over `message_id`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: >
          FK to `dim_contacts.contact_sk`. Resolved via LEFT JOIN to
          `dim_contacts`; NULL when the touch's `(location_id,
          contact_id)` doesn't appear in `dim_contacts` (typically
          historical contacts deleted from GHL, or contacts not yet
          captured by the latest contacts pull). Unattributed-contact
          diagnostics can count NULL `contact_sk` rows; mart-layer joins
          to `dim_contacts` correctly drop them.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: user_sk
        description: >
          FK to `dim_users.user_sk`. The rep who made the touch.
          Nullable: GHL /messages carries `user_id`s for system /
          automation actors that never appear in /users/search, so
          ~3.6k touches resolve to NULL `user_sk`. Mart-layer filters
          (SDR / AE leaderboards) naturally drop these via the role
          join; unattributed-touch diagnostics can count them.
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_sk
      - name: message_id
        description: GHL message id. Natural key for traceability.
        tests:
          - unique
          - not_null
      - name: touched_at
        description: UTC timestamp the outbound touch was sent (`sent_at`).
        tests:
          - not_null
      - name: channel
        description: >
          `call` when source `message_type = 'TYPE_CALL'`; `sms` when
          `TYPE_SMS`. No other values possible post-filter.
        tests:
          - not_null
          - accepted_values:
              values: ['call', 'sms']
      - name: match_method
        description: >
          Always `ghl_native` — messages carry `contact_id`/`user_id`
          directly from GHL, so no matching heuristic is needed.
        tests:
          - accepted_values:
              values: ['ghl_native']
      - name: match_score
        description: Always 1.00 (GHL-native join).

  - name: fct_payments
    description: >
      Grain: one row per payment event, unioned across Stripe and
      Fanbasis. Stripe rows are historical-only (Stripe banned at D-DEE
      per memory `project_stripe_historical_only.md`); Fanbasis is the
      live forward-going contributor (~466 rows / $170K gross as of
      2026-04-27). Contact attribution flows through
      `bridge_identity_contact_payment`, joined on
      `(source_platform, payment_id)`; `contact_sk` is nullable when
      the bridge returns `unmatched`.
    columns:
      - name: payment_sk
        description: Surrogate key over `(source_platform, payment_id)`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable when unmatched.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: payment_id
        description: Native payment id (Stripe `charge_id` or Fanbasis transaction id).
        tests:
          - not_null
      - name: source_platform
        description: Source of the payment (`stripe` / `fanbasis`).
        tests:
          - not_null
          - accepted_values:
              values: ['stripe', 'fanbasis']
      - name: transaction_date
        description: UTC timestamp of the payment.
        tests:
          - not_null
      - name: gross_amount
        description: Gross amount in major units (e.g. USD). Charge amount before refunds.
      - name: net_amount
        description: Net amount in major units — captured minus refunded.
      - name: currency
        description: ISO 4217 currency code.
      - name: product
        description: Free-text product description from the payment.
      - name: source_product_id
        description: Native product id from the payment source when available; populated for Fanbasis.
      - name: source_product_price
        description: Native product price in source payload currency major units when available. Fanbasis auto-renew rows expose the charged installment amount, not a full receivables schedule.
      - name: source_service_id
        description: Native service id from the payment source when available; populated for Fanbasis.
      - name: source_service_title
        description: Native service title from the payment source when available; populated for Fanbasis.
      - name: source_service_price
        description: Native service price in source payload currency major units when available.
      - name: source_service_payment_id
        description: Native Fanbasis service-payment id. Current raw data is one-to-one with transaction id, so this is not treated as an installment-plan grouping key.
      - name: source_fund_release_on
        description: Fanbasis payout release timestamp when available.
      - name: source_fund_released
        description: Fanbasis payout release flag when available.
      - name: payment_method
        description: Channel metadata from the source (e.g. Stripe `outcome_network_status`).
      - name: card_issue_country
        description: ISO country code from billing address.
      - name: match_method
        description: Tier used by the bridge (`email_exact` / `email_canonical` / `phone_last10` / `stripe_customer_email` / `stripe_customer_phone` / `fanbasis_conversation_email` / `fanbasis_unique_crm_name` / `billing_email_direct` / `unmatched`).
        tests:
          - not_null
          - accepted_values:
              values:
                - email_exact
                - email_canonical
                - phone_last10
                - stripe_customer_email
                - stripe_customer_phone
                - fanbasis_conversation_email
                - fanbasis_unique_crm_name
                - billing_email_direct
                - unmatched
      - name: match_score
        description: Confidence score attached to the chosen tier (0.00-1.00).
      - name: bridge_status
        description: Summary flag — `matched` / `ambiguous_multi_candidate` / `unmatched`.
        tests:
          - not_null
          - accepted_values:
              values:
                - matched
                - ambiguous_multi_candidate
                - unmatched

  - name: fct_refunds
    description: >
      Grain: one row per refund event. PK: `refund_sk`.
      **WARNING: Fanbasis-only — excludes Stripe historical refunds.**
      `stg_stripe__charges.amount_refunded_minor` is at charge-grain (one
      number per charge, not one row per refund event), so a Stripe arm
      would lose temporal fidelity. Aggregating `sum(refund_amount)` from
      this fact answers "live forward-going refunds since Fanbasis cutover,"
      not "total refunds in D-DEE history." See `fct_refunds__overview`
      doc block before using this fact in cross-period analysis.

      Contact attribution via `bridge_identity_contact_payment` joined on
      the **parent** payment's `(source_platform, payment_id)` — refunds
      inherit their contact from the original payment, so we do not re-run
      identity matching on the refund row.
    columns:
      - name: refund_sk
        description: Surrogate key over `(source_platform, refund_id)`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable when bridge returns `unmatched`.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: refund_id
        description: Native Fanbasis refund id (stringified).
        tests:
          - not_null
      - name: parent_payment_id
        description: Native id of the payment being refunded. Joins to `fct_payments.payment_id` at `(source_platform, parent_payment_id) = (source_platform, payment_id)`.
        tests:
          - not_null
      - name: source_platform
        description: Originating system. Always `fanbasis` today.
        tests:
          - not_null
          - accepted_values:
              values: ['fanbasis']
      - name: refunded_at
        description: UTC timestamp of the refund event.
        tests:
          - not_null
      - name: refund_amount
        description: Gross refund amount in USD (major units) returned to the customer.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: refund_amount_net
        description: Refund amount minus the processor fee, in USD. Can be negative if processor fee exceeds the gross refund (rare but legitimate on chargebacks).
      - name: refund_fee
        description: Processor fee charged on the refund, in USD.
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: refund_total_cost
        description: Total cost to merchant per Fanbasis (refund_amount + processor side-effects), in USD.
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: match_method
        description: Bridge tier that produced the contact attribution (or `unmatched`).
        tests:
          - not_null
          - accepted_values:
              values:
                - email_exact
                - email_canonical
                - phone_last10
                - stripe_customer_email
                - stripe_customer_phone
                - fanbasis_conversation_email
                - fanbasis_unique_crm_name
                - billing_email_direct
                - unmatched
      - name: bridge_status
        description: Overall bridge outcome — `matched`, `ambiguous_multi_candidate`, or `unmatched`.
        tests:
          - not_null
          - accepted_values:
              values:
                - matched
                - ambiguous_multi_candidate
                - unmatched
