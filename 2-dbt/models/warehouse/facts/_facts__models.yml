version: 2

models:
  - name: fct_calls_booked
    description: >
      Grain: one row per Calendly booking event — the Speed-to-Lead
      denominator source. Source: `stg_calendly__events`. Today
      `contact_sk`, `assigned_user_sk`, and `pipeline_stage_sk` resolve
      to NULL: the invitee-email axis (required for GHL contact join)
      lives in a sibling Calendly table not yet in staging — see
      Track C open threads. Columns retain the contract so the mart
      layer can compile today; backfill happens at invitee-staging
      drop-in, not by changing the fact shape.
    columns:
      - name: booking_sk
        description: Surrogate key over Calendly `event_id`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable pending invitee staging.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: assigned_user_sk
        description: FK to `dim_users.user_sk`. Nullable — resolved via GHL opportunity, not Calendly.
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_sk
      - name: pipeline_stage_sk
        description: FK to `dim_pipeline_stages.pipeline_stage_sk`. Nullable.
        tests:
          - relationships:
              to: ref('dim_pipeline_stages')
              field: pipeline_stage_sk
      - name: calendly_event_id
        description: Raw Calendly event id (`uri`). Natural key for traceability.
        tests:
          - not_null
      - name: booked_at
        description: >
          UTC timestamp the invitee confirmed the slot. Speed-to-Lead
          start clock.
        tests:
          - not_null
      - name: scheduled_for
        description: UTC timestamp the meeting is / was scheduled to start.
      - name: event_status
        description: Calendly event status (`active`, `canceled`, …).
      - name: cancelled_at
        description: UTC timestamp of cancellation when `event_status` is cancelled.

  - name: fct_outreach
    description: >
      Grain: one row per outbound human CALL/SMS. Source:
      `stg_ghl__messages` filtered to outbound CALL/SMS and joined to
      `stg_ghl__conversations` to require a non-null
      `last_manual_message_at` (excludes automation). No role filter —
      per Track D the SDR filter moves to the mart so this fact is
      reusable across SDR / AE / Closer cuts.
    columns:
      - name: touch_sk
        description: Surrogate key over `message_id`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`.
        tests:
          - not_null
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: user_sk
        description: >
          FK to `dim_users.user_sk`. The rep who made the touch.
          Nullable: GHL /messages carries `user_id`s for system /
          automation actors that never appear in /users/search, so
          ~3.6k touches resolve to NULL `user_sk`. Mart-layer filters
          (SDR / AE leaderboards) naturally drop these via the role
          join; unattributed-touch diagnostics can count them.
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_sk
      - name: message_id
        description: GHL message id. Natural key for traceability.
        tests:
          - unique
          - not_null
      - name: touched_at
        description: UTC timestamp the outbound touch was sent (`sent_at`).
        tests:
          - not_null
      - name: channel
        description: >
          `call` when source `message_type = 'TYPE_CALL'`; `sms` when
          `TYPE_SMS`. No other values possible post-filter.
        tests:
          - not_null
          - accepted_values:
              values: ['call', 'sms']
      - name: match_method
        description: >
          Always `ghl_native` — messages carry `contact_id`/`user_id`
          directly from GHL, so no matching heuristic is needed.
        tests:
          - accepted_values:
              values: ['ghl_native']
      - name: match_score
        description: Always 1.00 (GHL-native join).

  - name: fct_speed_to_lead_touch
    description: |
      One row per (booking × touch-event). Lowest-grain fact for Speed-to-Lead.
      Bookings with zero SDR touches emit one row with touch_sk = NULL.
      Resolves the show_outcome-fallback DQ gap noted in .claude/state/project-state.md.
      (source: "3 Data Modeling Mistakes That Can Derail a Team", Data Ops notebook —
      grain justification for going to the lowest level.)
    columns:
      - name: speed_to_lead_touch_sk
        description: Surrogate key over (booking_sk, coalesce(touch_sk, 'no-touch')). PK.
        tests:
          - unique
          - not_null
      - name: booking_sk
        description: FK to fct_calls_booked.booking_sk.
        tests:
          - not_null
          - relationships:
              to: ref('fct_calls_booked')
              field: booking_sk
      - name: touch_sk
        description: FK to fct_outreach.touch_sk. NULL when booking has no matched outbound SDR touch — semantically meaningful.
        tests:
          - relationships:
              to: ref('fct_outreach')
              field: touch_sk
      - name: contact_sk
        description: FK to dim_contacts.contact_sk.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: user_sk
        description: FK to dim_users.user_sk. The rep who made the touch. NULL when touch_sk IS NULL or the user is not in dim_users (roster gaps).
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_sk
      - name: sdr_sk
        description: FK to dim_sdr.sdr_sk. Populated only when user_sk resolves to a user with role = 'SDR'. NULL for non-SDR touches.
        tests:
          - relationships:
              to: ref('dim_sdr')
              field: sdr_sk
      - name: source_sk
        description: FK to dim_source.source_sk. Never NULL — __unknown__ sentinel row handles missing lead_source.
        tests:
          - not_null
          - relationships:
              to: ref('dim_source')
              field: source_sk
      - name: date_sk
        description: FK to dim_calendar_dates.date_sk on date(booked_at).
        tests:
          - not_null
          - relationships:
              to: ref('dim_calendar_dates')
              field: date_sk
      - name: booked_at
        description: UTC timestamp of the Calendly booking event. Speed-to-Lead start clock.
        tests:
          - not_null
      - name: touched_at
        description: UTC timestamp of the outbound touch. NULL when touch_sk is NULL.
      - name: minutes_to_touch
        description: Elapsed minutes from booked_at to touched_at. NULL when no touch.
      - name: is_first_touch
        description: TRUE on exactly one row per booking — the OVERALL earliest outbound touch row, regardless of toucher role. FALSE for subsequent touches and no-touch rows. Paired with `is_sdr_touch`, `is_first_touch AND is_sdr_touch` reproduces the legacy `sales_activity_detail.first_toucher_role = 'SDR'` filter for the locked 2026-04-19 headline metric.
      - name: is_sdr_touch
        description: TRUE when the touching user's current role is 'SDR'. Uses current-state dim_users join (v1); SCD-2 as-of join deferred to F2.
      - name: channel
        description: Touch channel — 'call', 'sms', or NULL when touch_sk is NULL.
      - name: is_within_5_min_sla
        description: TRUE when is_first_touch AND is_sdr_touch AND minutes_to_touch < 5. The headline Speed-to-Lead metric numerator.
      - name: had_any_sdr_activity_within_1_hr
        description: Booking-grain flag — TRUE if any SDR touch landed within 60 min of booked_at, regardless of which touch row this is.
      - name: event_status
        description: Calendly event status (active, canceled, etc.) from fct_calls_booked.
      - name: cancelled_at
        description: Cancellation timestamp when event_status indicates cancellation.
      - name: show_outcome
        description: >
          showed / no_show / cancelled / pending. Derived from Calendly event_status
          + GHL opportunity last_stage_change_at. v1 heuristic; fallback documented
          in model comment for F3 finalization.
        tests:
          - accepted_values:
              values: [showed, no_show, cancelled, pending]
      - name: close_outcome
        description: won / lost / pending. Mirrors the closer_and_outcome CTE in sales_activity_detail.
        tests:
          - accepted_values:
              values: [won, lost, pending]
      - name: closed_at
        description: UTC timestamp of won/lost status change on the linked opportunity.
      - name: lost_reason
        description: Raw GHL lost_reason_id. FK to lost-reason lookup (v1 raw id; enrichment deferred).
      - name: attribution_quality_flag
        description: >
          no_sdr_touch / role_unknown / pre_utm_era / clean.
          Verbatim logic from sales_activity_detail attribution_quality_flag column.
      - name: attribution_era
        description: pre_UTM or utm — passed through from dim_contacts.
      - name: era_flag
        description: ramping (booked_at < 2026-03-16) or stable (>= 2026-03-16). Matches sales_activity_detail era_flag logic.
      - name: mart_refreshed_at
        description: Timestamp of the most recent dbt build for this row.

  - name: fct_payments
    description: >
      Grain: one row per payment event, unioned across Stripe and
      Fanbasis. Stripe rows are historical-only (Stripe banned at D-DEE
      per memory `project_stripe_historical_only.md`); Fanbasis is the
      live forward-going contributor (~466 rows / $170K gross as of
      2026-04-27). Contact attribution flows through
      `bridge_identity_contact_payment`, joined on
      `(source_platform, payment_id)`; `contact_sk` is nullable when
      the bridge returns `unmatched`.
    columns:
      - name: payment_sk
        description: Surrogate key over `(source_platform, payment_id)`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable when unmatched.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: payment_id
        description: Native payment id (Stripe `charge_id` or Fanbasis transaction id).
        tests:
          - not_null
      - name: source_platform
        description: Source of the payment (`stripe` / `fanbasis`).
        tests:
          - not_null
          - accepted_values:
              values: ['stripe', 'fanbasis']
      - name: transaction_date
        description: UTC timestamp of the payment.
        tests:
          - not_null
      - name: gross_amount
        description: Gross amount in major units (e.g. USD). Charge amount before refunds.
      - name: net_amount
        description: Net amount in major units — captured minus refunded.
      - name: currency
        description: ISO 4217 currency code.
      - name: product
        description: Free-text product description from the payment.
      - name: payment_method
        description: Channel metadata from the source (e.g. Stripe `outcome_network_status`).
      - name: card_issue_country
        description: ISO country code from billing address.
      - name: match_method
        description: Tier used by the bridge (`email_exact` / `email_canonical` / `phone_last10` / `billing_email_direct` / `unmatched`).
        tests:
          - not_null
          - accepted_values:
              values:
                - email_exact
                - email_canonical
                - phone_last10
                - billing_email_direct
                - unmatched
      - name: match_score
        description: Confidence score attached to the chosen tier (0.00-1.00).
      - name: bridge_status
        description: Summary flag — `matched` / `ambiguous_multi_candidate` / `unmatched`.
        tests:
          - not_null
          - accepted_values:
              values:
                - matched
                - ambiguous_multi_candidate
                - unmatched

  - name: fct_refunds
    description: >
      Grain: one row per refund event. PK: `refund_sk`. Fanbasis-only
      today (Stripe staging exposes only charge-grain `amount_refunded_minor`,
      not refund-event grain). Contact attribution via
      `bridge_identity_contact_payment` joined on the **parent** payment's
      `(source_platform, payment_id)` — refunds inherit their contact from
      the original payment, so we do not re-run identity matching on the
      refund row.
    columns:
      - name: refund_sk
        description: Surrogate key over `(source_platform, refund_id)`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable when bridge returns `unmatched`.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: refund_id
        description: Native Fanbasis refund id (stringified).
        tests:
          - not_null
      - name: parent_payment_id
        description: Native id of the payment being refunded. Joins to `fct_payments.payment_id` at `(source_platform, parent_payment_id) = (source_platform, payment_id)`.
        tests:
          - not_null
      - name: source_platform
        description: Originating system. Always `fanbasis` today.
        tests:
          - not_null
          - accepted_values:
              values: ['fanbasis']
      - name: refunded_at
        description: UTC timestamp of the refund event.
        tests:
          - not_null
      - name: refund_amount
        description: Gross refund amount in USD (major units) returned to the customer.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: match_method
        description: Bridge tier that produced the contact attribution (or `unmatched`).
        tests:
          - not_null
          - accepted_values:
              values:
                - email_exact
                - email_canonical
                - phone_last10
                - billing_email_direct
                - unmatched
      - name: bridge_status
        description: Overall bridge outcome — `matched`, `ambiguous_multi_candidate`, or `unmatched`.
        tests:
          - not_null
          - accepted_values:
              values:
                - matched
                - ambiguous_multi_candidate
                - unmatched
