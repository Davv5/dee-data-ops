version: 2

models:
  - name: mart_volume_history
    description: >
      Incremental daily snapshot of row counts for each of the three
      client-facing marts (sales_activity_detail, lead_journey,
      revenue_detail). One row per (mart, snapshot_date). Feeds the
      volume_drift warn-test (singular test at
      `2-dbt/tests/volume_drift.sql`) which compares each day's count to the
      prior day and surfaces mart_name / snapshot_date / pct_drift when
      movement exceeds ±10%. The nightly workflow runs that test with
      `--warn-error` in a separate step (continue-on-error) so a warn
      becomes a soft Slack alert without failing the build.
    columns:
      - name: snapshot_date
        description: UTC date the snapshot was taken (current_date() at run time).
        tests:
          - not_null
      - name: mart_name
        description: Name of the mart whose row count was captured.
        tests:
          - not_null
          - accepted_values:
              values: ['sales_activity_detail', 'lead_journey', 'revenue_detail']
      - name: row_count
        description: Total rows in the named mart at snapshot time.
        tests:
          - not_null
