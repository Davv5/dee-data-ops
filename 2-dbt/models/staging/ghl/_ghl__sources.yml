version: 2

sources:
  - name: ghl
    description: >
      Raw landing zone for GoHighLevel v2 API data. Reads from per-entity
      VIEWS in `raw_ghl_v2`, each filtering the live single-table
      `Raw.ghl_objects_raw` by `entity_type` and aliasing
      `ingested_at AS _ingested_at` to match the legacy column shape.
      `Raw.ghl_objects_raw` is populated by `bq-ingest` Cloud Run service
      (consolidated 2026-04-28, see `services/bq-ingest/`).

      Schema-level history (2026-04-29 cutover): originally `schema:
      raw_ghl` pointed at per-entity tables `raw_ghl.ghl__<obj>_raw`.
      Those tables stopped receiving writes 2026-04-19 when the bq-ingest
      service was retargeted to the union table `Raw.ghl_objects_raw`.
      The cutover here repoints staging at the new views without dropping
      the legacy tables (preserved as historical reference; clean up at
      Phase 6).

      Column shape (unchanged for downstream): the views expose
      `(entity_id, _ingested_at, payload_json, location_id, partition_date,
      event_ts, updated_at_ts, source, backfill_run_id, is_backfill)`.
      Staging models continue to read `entity_id`, `_ingested_at`,
      `payload_json` and rename to `(id, _ingested_at, payload)` in their
      source CTEs.

      Coverage notes (2026-04-29):
        - contacts:            16,031 rows in union (covered)
        - opportunities:       26,156 rows (covered)
        - conversations:       1,572 rows  (covered; legacy had 101 rows)
        - pipelines:           36 rows     (covered)
        - users:               16 rows post-2026-04-30 GHL_COMPANY_ID fix.
        - messages:            RETIRED 2026-04-30. The `entity_type='messages'`
                               filter on `raw_ghl_v2.ghl__messages_raw` was
                               filtering on a non-existent entity type (actual
                               outbound entities are `outbound_call_logs` +
                               `conversations`). `STG.stg_ghl__messages` and
                               its source declaration both retired in PR #3
                               of the Bug #2 cleanup chain (PRs #142/#143/this).
                               `fct_outreach` now reads `Core.fct_ghl_outbound_calls`
                               + `Core.fct_ghl_conversations` directly via
                               `2-dbt/models/warehouse/_core__sources.yml`.
    schema: raw_ghl_v2
    config:
      loaded_at_field: _ingested_at
    tables:
      - name: users
        identifier: ghl__users_raw
        # Freshness disabled: 0 rows on both legacy + union paths;
        # bq-ingest does not poll users. Re-enable when the upstream
        # extraction lands; see Strategic-Reset-paused threads in
        # `.claude/state/project-state.md`.
        freshness: null
        description: >
          One row per GHL user (agency + account scope). ~16 rows expected;
          0 rows present in `raw_ghl.ghl__users_raw` as of U1 preflight —
          scheduler path is not populating this entity_type on either the
          per-object or legacy blob table. Staging passes zero rows through
          until upstream fix.
        columns:
          - name: entity_id
            description: GHL user id (primary key of the source record).
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: >
              JSON column — full user object as returned by GHL /users/search.
              Cast to string in staging for downstream compatibility.
            tests:
              - not_null

      - name: opportunities
        identifier: ghl__opportunities_raw
        description: >
          One row per GHL opportunity. The "booked call" denominator for the
          headline Speed-to-Lead metric comes from this table (stage = booked).
          ~26K rows across 20+ pipelines.
        config:
          freshness:
            warn_after: {count: 36, period: hour}
            error_after: {count: 48, period: hour}
        columns:
          - name: entity_id
            description: GHL opportunity id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full opportunity object.
            tests:
              - not_null

      - name: conversations
        identifier: ghl__conversations_raw
        description: >
          One row per GHL conversation (a contact-level thread spanning CALL /
          SMS / EMAIL). The "first outbound human SDR touch" numerator for the
          headline metric comes from this table, using `lastManualMessageDate`
          (human-originated) vs `lastMessageDate` (includes workflow automation)
          to exclude workflow touches. Expected ~15K rows; **101 rows present**
          in `raw_ghl.ghl__conversations_raw` as of U1 preflight §7 (vs 1,314
          in `Raw.ghl_objects_raw`). U4a parity will surface whether this gap
          is acceptable or the staging should shim from the blob.
        config:
          freshness:
            warn_after: {count: 36, period: hour}
            error_after: {count: 48, period: hour}
        columns:
          - name: entity_id
            description: GHL conversation id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full conversation object.
            tests:
              - not_null

      - name: contacts
        identifier: ghl__contacts_raw
        description: One row per GHL contact (the lead-level entity). ~15.8K rows.
        columns:
          - name: entity_id
            description: GHL contact id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full contact object.
            tests:
              - not_null

      - name: pipelines
        identifier: ghl__pipelines_raw
        description: >
          One row per GHL pipeline (with nested `stages` array in payload).
          Resolves opaque `pipelineStageId` on opportunities into human-readable
          stage names; also powers the lead-magnet performance panel. ~36 rows.
        columns:
          - name: entity_id
            description: GHL pipeline id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full pipeline object (including nested stages).
            tests:
              - not_null
