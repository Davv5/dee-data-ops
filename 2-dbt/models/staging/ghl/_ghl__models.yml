version: 2

models:
  - name: stg_ghl__users
    description: >
      1:1 staging view on `raw_ghl.users`. Deduped on `id` keeping the latest
      `_ingested_at`. Flattens the JSON payload into typed columns; no joins.
      SDR/AE role attribution happens downstream in `dim_sdrs` via the
      `ghl_sdr_roster` seed — GHL's native `roles.type` / `roles.role` fields
      are agency/account × user/admin, which is orthogonal to SDR/AE.
    columns:
      - name: user_id
        description: GHL user id. Primary key.
        tests:
          - unique
          - not_null

      - name: email
        description: User's email address.
        tests:
          - not_null

      - name: full_name
        description: Display name as stored in GHL (`name` field of the payload).

      - name: first_name
        description: First name.

      - name: last_name
        description: Last name.

      - name: phone
        description: E.164-formatted phone number, as stored in GHL.

      - name: ghl_account_type
        description: >
          `roles.type` from GHL — either `agency` (users with cross-location
          reach) or `account` (users scoped to this location only). Orthogonal
          to SDR/AE; used for traceability, not metric logic.

      - name: ghl_role
        description: >
          `roles.role` from GHL — either `user` or `admin`. Orthogonal to
          SDR/AE; used for traceability, not metric logic.

      - name: is_deleted
        description: True if the GHL user has been soft-deleted.

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.

  - name: stg_ghl__opportunities
    description: >
      1:1 staging view on `raw_ghl.opportunities`. Deduped on `id` keeping the
      latest `_ingested_at`. Flattens the JSON payload into typed scalar
      columns; no joins, no nested arrays (customFields, relations, followers,
      attributions, and the embedded `contact` object are deliberately dropped
      — the embedded contact is re-derivable via `contact_id` → stg_ghl__contacts).
      This is the denominator source for the headline Speed-to-Lead metric:
      filter on `pipeline_stage_id` = the "booked" stage (TBD, pending config
      inspection) and use `last_stage_change_at` as the booking event timestamp.
    columns:
      - name: opportunity_id
        description: GHL opportunity id. Primary key.
        tests:
          - unique
          - not_null

      - name: opportunity_name
        description: Display name of the opportunity (typically the contact's full name).

      - name: status
        description: >
          Opportunity lifecycle status. `lost` is part of the DQ exclusion
          filter for the Speed-to-Lead metric per the locked scope.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['open', 'won', 'lost', 'abandoned']

      - name: lead_source
        description: >
          Free-text source attribution as recorded in GHL (`source` field) —
          e.g., "IG", "FB Form". Not a controlled vocabulary.

      - name: pipeline_id
        description: GHL pipeline the opportunity lives in. 20+ pipelines configured at D-DEE.

      - name: pipeline_stage_id
        description: >
          Current stage within the pipeline. The "booked" stage id(s) are the
          filter for the headline metric denominator — specific value(s) TBD
          from pipeline config inspection with David.
        tests:
          - not_null

      - name: contact_id
        description: FK to stg_ghl__contacts (the lead-level entity).
        tests:
          - not_null

      - name: assigned_user_id
        description: >
          FK to stg_ghl__users — the GHL user currently assigned to the
          opportunity. Mostly null at D-DEE (~99.8%); SDR/AE identity for the
          metric comes from conversations.assignedTo, not opportunities.

      - name: location_id
        description: GHL location (tenant) the opportunity belongs to.

      - name: lost_reason_id
        description: FK to GHL's lost-reason taxonomy. Populated only when status = 'lost'.

      - name: monetary_value
        description: Dollar value attached to the opportunity (numeric; 0 when unset).

      - name: forecast_probability
        description: Manually-set forecast probability (nullable).

      - name: effective_probability
        description: GHL-computed effective probability (0-100).

      - name: opportunity_created_at
        description: When the opportunity was created in GHL.
        tests:
          - not_null

      - name: opportunity_updated_at
        description: When the opportunity row was last touched in GHL.

      - name: last_status_change_at
        description: When `status` last transitioned (open → won/lost/abandoned).

      - name: last_stage_change_at
        description: >
          When `pipeline_stage_id` last transitioned. This is the booking-event
          timestamp for the Speed-to-Lead metric (paired with the booked-stage
          filter on `pipeline_stage_id`).
        tests:
          - not_null

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.

  - name: stg_ghl__contacts
    description: >
      1:1 staging view on `raw_ghl.contacts`. Deduped on `id` keeping the
      latest `_ingested_at`. Flattens the JSON payload into typed scalar
      columns; nested arrays (tags, customFields, followers, additionalEmails,
      attributions) are deliberately dropped — staging is flat, and these can
      be re-exploded downstream if a mart needs them. Contacts are the
      lead-level entity: `opportunity.contact_id` and `conversation.contactId`
      both FK here. Load-bearing for the Speed-to-Lead DQ filter: contacts
      with null `phone` are excluded from the metric per the locked scope.
    columns:
      - name: contact_id
        description: GHL contact id. Primary key.
        tests:
          - unique
          - not_null

      - name: location_id
        description: GHL location (tenant) the contact belongs to.

      - name: assigned_user_id
        description: >
          FK to stg_ghl__users — the GHL user currently assigned to the
          contact (nullable). Not used for SDR/AE attribution on the
          Speed-to-Lead metric; that comes from conversations.assignedTo.

      - name: business_id
        description: FK to GHL's business-unit taxonomy (nullable).

      - name: contact_name
        description: Display name as stored in GHL (`contactName` field).

      - name: first_name
        description: First name (lowercased / normalized by GHL).

      - name: last_name
        description: Last name (lowercased / normalized by GHL).

      - name: first_name_raw
        description: First name as originally submitted (preserves casing).

      - name: last_name_raw
        description: Last name as originally submitted (preserves casing).

      - name: company_name
        description: Contact's company affiliation, if provided.

      - name: email
        description: Email address, as stored in GHL.

      - name: phone
        description: >
          E.164-formatted phone number. Null phones are part of the DQ
          exclusion filter for the Speed-to-Lead metric per the locked scope.

      - name: contact_type
        description: >
          GHL contact classification (`type` field) — e.g., `lead`, `customer`.
          Free-text; not a controlled vocabulary enforced at source.

      - name: lead_source
        description: >
          Free-text source attribution as recorded in GHL (`source` field) —
          e.g., "IG DBB Manu Comm Templates", "FB Form". Not normalized.

      - name: is_dnd
        description: >
          True if the contact has a do-not-disturb flag set in GHL. Per the
          locked scope, `dnd` is NOT a filter for the Speed-to-Lead metric.

      - name: city
        description: City, as stored in GHL.

      - name: state
        description: State / region, as stored in GHL.

      - name: postal_code
        description: Postal / ZIP code, as stored in GHL.

      - name: address1
        description: Street address line 1.

      - name: country
        description: ISO country code (e.g., "US"), as stored in GHL.

      - name: timezone
        description: IANA timezone string (e.g., "America/Los_Angeles").

      - name: website
        description: Contact's website URL, if provided.

      - name: date_of_birth
        description: Contact's date of birth, if provided.

      - name: contact_created_at
        description: When the contact was first created in GHL.
        tests:
          - not_null

      - name: contact_updated_at
        description: When the contact row was last touched in GHL.

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.

  - name: stg_ghl__conversations
    description: >
      1:1 staging view on `raw_ghl.conversations`. Deduped on `id` keeping the
      latest `_ingested_at`. Flattens the JSON payload into typed columns; no
      joins. Epoch-millisecond date fields from GHL are cast to BigQuery
      TIMESTAMPs here so downstream models never handle raw millis.

      This is the numerator source for the headline Speed-to-Lead metric:
      `last_manual_message_at` (human-originated) is the exclusion lever against
      `last_message_at` (includes workflow automation), and
      `last_outbound_action = 'manual'` + `last_message_direction = 'outbound'`
      + `last_message_type in ('TYPE_CALL','TYPE_SMS')` together define a
      countable human SDR touch.

      Caveat: `assigned_user_id` is populated on only ~1% of rows (176/15527 as
      of 2026-04-19). SDR attribution via this field alone will therefore be
      sparse; warehouse-layer logic may need a message-level source
      (GHL /conversations/{id}/messages) to attribute touches reliably.
      Flagged for Phase 3.
    columns:
      - name: conversation_id
        description: GHL conversation id. Primary key.
        tests:
          - unique
          - not_null

      - name: contact_id
        description: GHL contact id this conversation belongs to. FK → stg_ghl__contacts.
        tests:
          - not_null

      - name: assigned_user_id
        description: >
          GHL user assigned to this conversation, if any. FK → stg_ghl__users.
          Sparsely populated (~1%) — see model-level note.

      - name: location_id
        description: GHL location (tenant) id. Single-tenant at D-DEE.

      - name: conversation_type
        description: Conversation channel type (e.g. `TYPE_PHONE`, `TYPE_EMAIL`).

      - name: last_message_type
        description: >
          Type of the most recent message in the thread. Values observed:
          `TYPE_NO_SHOW`, `TYPE_CALL`, `TYPE_SMS`, `TYPE_EMAIL`,
          `TYPE_CAMPAIGN_CALL`, `TYPE_SMS_REACTION`. The Speed-to-Lead metric
          counts only `TYPE_CALL` and `TYPE_SMS`.

      - name: last_message_direction
        description: '`inbound` or `outbound`. Outbound required for the metric numerator.'

      - name: last_outbound_action
        description: >
          `manual` if the last outbound message was human-originated, otherwise
          from a GHL workflow/automation. This is the primary human-vs-automation
          lever for the Speed-to-Lead metric.

      - name: last_message_at
        description: >
          Timestamp of the most recent message of any origin (human OR workflow
          automation). Converted from GHL epoch-millis.

      - name: last_manual_message_at
        description: >
          Timestamp of the most recent *human-originated* message. Converted from
          GHL epoch-millis. Null if no manual message has ever been sent/received
          in this conversation. This is the field used in the metric numerator
          to exclude automated workflow touches.

      - name: created_at
        description: When the conversation thread was created in GHL (from `dateAdded`).

      - name: updated_at
        description: When the conversation was last updated in GHL (from `dateUpdated`).

      - name: unread_count
        description: Number of unread messages in the thread.

      - name: in_inbox
        description: True if the conversation currently appears in a user's inbox.

      - name: is_attributed
        description: GHL-internal attribution flag on the contact. Nullable.

      - name: is_last_message_internal_comment
        description: >
          True if the most recent message was an internal comment (staff-only
          note), not a customer-facing touch. Should be excluded from the metric.

      - name: contact_full_name
        description: Denormalized snapshot of contact name as of the last ingest.

      - name: contact_email
        description: Denormalized snapshot of contact email as of the last ingest.

      - name: contact_phone
        description: Denormalized snapshot of contact phone as of the last ingest.

      - name: company_name
        description: Denormalized company name from the contact record.

      - name: tags
        description: Array of tag strings on the conversation/contact.

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.

  - name: stg_ghl__pipelines
    description: >
      1:1 staging view on `raw_ghl.pipelines`. Deduped on `id` keeping the
      latest `_ingested_at`. Flattens pipeline-level scalars (name, location,
      funnel-visibility flags); the nested `stages` array is preserved as a
      JSON value (`stages_json`) — unnesting into one-row-per-stage happens
      downstream (likely `dim_pipeline_stage` in warehouse).

      Two loads this table carries:
        - Resolves opaque `pipeline_stage_id` on `stg_ghl__opportunities` into
          human-readable stage names → required to identify the "booked"
          stage for the Speed-to-Lead metric denominator.
        - Source for the lead-magnet-performance panel (each D-DEE pipeline
          corresponds to one lead-magnet funnel; per-pipeline conversion
          metrics read from here).
    columns:
      - name: pipeline_id
        description: GHL pipeline id. Primary key.
        tests:
          - unique
          - not_null

      - name: pipeline_name
        description: Display name of the pipeline (e.g. "Lead Magnet — SMS Marketing"). At D-DEE each pipeline ≈ one lead-magnet funnel.
        tests:
          - not_null

      - name: location_id
        description: GHL location (tenant) id. Single-tenant at D-DEE.

      - name: show_in_funnel
        description: GHL display flag — whether this pipeline appears in the funnel view. Informational only.

      - name: show_in_pie_chart
        description: GHL display flag — whether this pipeline appears in the pie-chart view. Informational only.

      - name: stages_json
        description: >
          Raw JSON array of pipeline stages (each stage is an object with
          id/name/position/originId). Kept as JSON at staging — unnested into
          tabular form by a downstream stage dimension. Use `JSON_QUERY_ARRAY` /
          `UNNEST` to explode.

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.
