version: 2

# Fanbasis is the live revenue source for D-DEE. The extractor lands completed
# checkout-session transaction rows plus source-depth customer/subscriber
# identity objects. Subscriber schedules are still collected-cash truth until
# remaining-balance entities are available.

sources:
  - name: raw_fanbasis
    description: >
      Raw landing zone for Fanbasis. The authoritative extractor lives under
      `services/bq-ingest/sources/fanbasis/` and currently calls
      `/public-api/checkout-sessions/transactions`, `/public-api/customers`,
      and `/public-api/subscribers`.
    schema: Raw
    config:
      loaded_at_field: ingested_at
      freshness:
        warn_after: {count: 30, period: hour}
        error_after: {count: 72, period: hour}
    tables:
      - name: fanbasis_transactions_txn_raw
        description: >
          Fanbasis transaction landing table in the consolidated project.
          This is completed-payment grain: product/service/payment fields are
          present, but subscriber schedule and remaining-balance entities are
          not part of this raw table.
        columns:
          - name: entity_id
            description: Fanbasis transaction id when present in the upstream landing table.
          - name: ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column containing the Fanbasis transaction payload.

      - name: fanbasis_objects_raw
        description: >
          Fanbasis non-transaction object landing table. First source-depth
          objects are `customers` and `subscribers`, used to diagnose buyers
          who exist in Fanbasis but do not yet exist as GHL contacts.
        columns:
          - name: object_type
            description: Fanbasis object family (`customers`, `subscribers`, etc.).
            tests:
              - not_null
          - name: object_id
            description: Native Fanbasis object id within the object family.
            tests:
              - not_null
          - name: ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column containing the Fanbasis object payload.
