version: 2

models:
  - name: stg_fanbasis__customers
    description: >
      1:1 staging view on Fanbasis `customers` objects landed in
      `raw_fanbasis.fanbasis_objects_raw`.
      Grain: one row per Fanbasis customer. Used as source-depth identity
      truth for buyers who paid in Fanbasis but are missing in GHL.
    columns:
      - name: customer_id
        description: Native Fanbasis customer id from `$.id`.
        tests:
          - unique
          - not_null
      - name: customer_name
        description: Fanbasis customer display name.
      - name: customer_email
        description: Fanbasis customer email.
      - name: customer_email_norm
        description: Lowercased / trimmed Fanbasis customer email.
      - name: customer_phone
        description: Fanbasis customer phone when supplied.
      - name: customer_phone_digits
        description: Numeric-only customer phone for bridge diagnostics.
      - name: total_transactions
        description: Fanbasis-reported transaction count for this customer.
      - name: total_spent
        description: Fanbasis-reported total customer spend in USD major units.
      - name: last_transaction_at
        description: Fanbasis-reported timestamp of the latest customer transaction.
      - name: _ingested_at
        description: Wall-clock UTC time this customer object landed in raw.

  - name: stg_fanbasis__subscribers
    description: >
      1:1 staging view on Fanbasis `subscribers` objects landed in
      `raw_fanbasis.fanbasis_objects_raw`.
      Grain: one row per Fanbasis subscriber/subscription object. Carries the
      customer id that matches transaction `fan_id`, plus product and
      subscription status context.
    columns:
      - name: subscriber_id
        description: Native Fanbasis subscriber object id from `$.id`.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Fanbasis subscriber customer id; matches transaction `fan_id`.
      - name: customer_name
        description: Fanbasis subscriber customer name.
      - name: customer_email
        description: Fanbasis subscriber customer email.
      - name: customer_email_norm
        description: Lowercased / trimmed subscriber customer email.
      - name: customer_phone
        description: Fanbasis subscriber customer phone when supplied.
      - name: product_id
        description: Fanbasis product id tied to the subscription.
      - name: product_title
        description: Fanbasis product title tied to the subscription.
      - name: subscription_id
        description: Fanbasis subscription id from the nested subscription object.
      - name: subscription_status
        description: Fanbasis subscription status.
      - name: auto_renew_count
        description: Fanbasis-reported auto-renew count for this subscription.
      - name: has_charge_consent
        description: Whether Fanbasis reports charge consent for this subscription.
      - name: subscription_created_at
        description: Subscription creation timestamp from Fanbasis.
      - name: subscription_updated_at
        description: Subscription update timestamp from Fanbasis.
      - name: _ingested_at
        description: Wall-clock UTC time this subscriber object landed in raw.

  - name: stg_fanbasis__transactions
    description: >
      1:1 staging view on `raw_fanbasis.fanbasis_transactions_txn_raw`. One row
      per Fanbasis transaction (live revenue source for D-DEE post-Stripe-ban,
      per memory `project_stripe_historical_only.md`). PK: `payment_id`
      (cast to string for cross-platform uniqueness in the warehouse fact's
      surrogate-key hash).

      Amounts are preserved in **major units** (USD) — Fanbasis payloads in
      D-DEE's tenant carry no `currency` field, so `currency` is hardcoded
      `'usd'` here per the staging "rename and light cast" mandate.

      `is_captured` and `is_paid` are true by construction (the raw landing
      only contains settled transactions; no pending/auth-only state surfaces
      in the payload). `is_refunded` is derived from non-empty
      `$.refunds` JSON array.

      Wired into `fct_payments` as the live forward-going contributor; Stripe
      remains in the union for historical preservation only.
    columns:
      - name: payment_id
        description: Fanbasis transaction id (stringified). Primary key.
        tests:
          - unique
          - not_null

      - name: gross_amount
        description: Gross transaction amount in USD (major units).

      - name: net_amount
        description: Net amount after Fanbasis fees, in USD (major units).

      - name: fee_amount
        description: Fanbasis platform fee, in USD (major units).

      - name: currency
        description: Hardcoded `'usd'` — Fanbasis payloads carry no currency field at this tenant.

      - name: product_title
        description: Human-readable product/offer name from `$.product.title`.

      - name: product_id
        description: Fanbasis product id from `$.product.id`.

      - name: product_internal_name
        description: Internal Fanbasis product name from `$.product.internal_name`.

      - name: product_price
        description: Fanbasis product price on the transaction payload, in USD major units. For auto-renew rows this is the charged installment amount, not a validated remaining balance.

      - name: service_title
        description: Fanbasis service title from `$.service.title`.

      - name: service_id
        description: Fanbasis service id from `$.service.id`.

      - name: service_price
        description: Fanbasis service price on the transaction payload, in USD major units.

      - name: payment_type
        description: Payment type from `$.servicePayment.payment_type` (e.g. `upfront`).
        tests:
          - accepted_values:
              arguments:
                values: ['upfront', 'auto_renew']

      - name: service_payment_id
        description: Fanbasis service-payment id from `$.servicePayment.id`.

      - name: fund_release_on
        description: Fanbasis payout release timestamp from `$.servicePayment.fund_release_on`.

      - name: fund_released
        description: Fanbasis payout release flag from `$.servicePayment.fund_released`.

      - name: fan_id
        description: Fanbasis "fan" (payer) id from `$.fan.id`.

      - name: fan_email
        description: Email on the Fanbasis transaction's `$.fan.email`. Used for identity bridge.

      - name: fan_name
        description: Display name on the Fanbasis transaction's `$.fan.name`.

      - name: fan_phone
        description: Phone on the Fanbasis transaction's `$.fan.phone` (often null).

      - name: fan_country_code
        description: ISO country code on `$.fan.country_code` (often null in this tenant).

      - name: transaction_date
        description: UTC timestamp of the transaction from `$.transaction_date`.
        tests:
          - not_null

      - name: is_captured
        description: True by construction — raw landing only contains settled transactions.

      - name: is_paid
        description: True by construction — raw landing only contains settled transactions.

      - name: is_refunded
        description: True if `$.refunds` JSON array is non-empty (full or partial refund present).

      - name: _ingested_at
        description: Wall-clock UTC time the row landed in `Raw.fanbasis_transactions_txn_raw`.

  - name: stg_fanbasis__refunds
    description: >
      Grain: one row per refund event. PK: `refund_id`.
      Refund-event staging on `raw_fanbasis.fanbasis_transactions_txn_raw`
      — unnests the `$.refunds` JSON array (multi refunds per parent
      payment supported, though current data is single-refund-per-
      transaction). FK to parent payment via
      `(source_platform='fanbasis', payment_id)` join into `fct_payments`.

      Amounts in major units (USD); currency hardcoded `'usd'` matching
      `stg_fanbasis__transactions` (Fanbasis tenant carries no currency
      field).
    columns:
      - name: refund_id
        description: Fanbasis refund id (stringified). Primary key.
        tests:
          - unique
          - not_null

      - name: payment_id
        description: Parent Fanbasis transaction id. Joins to `stg_fanbasis__transactions.payment_id`.
        tests:
          - not_null

      - name: refund_amount
        description: Gross refund amount in USD (major units) returned to the customer.
        tests:
          - not_null

      - name: refund_amount_net
        description: Refund amount minus the processor fee, in USD.

      - name: refund_fee
        description: Processor fee charged on the refund, in USD.

      - name: refund_total_cost
        description: Total cost to merchant (refund_amount + processor side-effects), in USD.

      - name: currency
        description: Hardcoded `'usd'` to match parent transaction.

      - name: refunded_at
        description: UTC timestamp the refund event occurred (Fanbasis `$.created_at`).
        tests:
          - not_null

      - name: _ingested_at
        description: Wall-clock UTC time the parent row landed in raw.
