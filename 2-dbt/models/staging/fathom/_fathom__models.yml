version: 2

models:
  - name: stg_fathom__calls
    description: >
      1:1 staging view over `Raw.fathom_calls_raw`. Deduped on `call_id`
      keeping the most recent `_ingested_at`. Preserves the BQML
      classifier's top-level columns
      (`is_revenue_relevant`, `classification_label`,
      `classification_confidence`, `classification_reason`) alongside the
      JSON-decoded recorder / meeting / URL fields.

      Fathom stores transcript as nested JSON segments. `transcript` preserves
      that raw JSON at call grain; use `stg_fathom__transcript_segments` for
      analysis-ready speaker/text rows.
    columns:
      - name: call_id
        description: Fathom recording id.
        tests:
          - unique
          - not_null
      - name: recorded_by_email
        description: >
          Email of the Fathom user who started the recording — maps to the
          SDR/closer identity for call attribution downstream.
      - name: recording_start_at
        description: When the recording actually started (UTC).
      - name: scheduled_start_at
        description: When the call was scheduled to start (from Calendly / calendar).
      - name: is_revenue_relevant
        description: >
          BQML classifier output — true if this call is a sales-relevant
          conversation (as opposed to internal / team / misc).
      - name: classification_label
        description: BQML classifier label (free-form, model-dependent).
      - name: transcript
        description: Raw transcript JSON array from Fathom, when present.
      - name: transcript_segment_count
        description: Count of transcript segments embedded in the raw Fathom payload.
      - name: _ingested_at
        description: Wall-clock UTC time this row landed in BigQuery.

  - name: stg_fathom__transcript_segments
    description: >
      Source-shaped child extraction from `Raw.fathom_calls_raw`: one row per
      transcript segment embedded in Fathom's `$.transcript[]` payload. Used
      for speaker/text evidence without changing the call-grain staging model.
    columns:
      - name: transcript_segment_sk
        description: Surrogate key over call id and segment index.
        tests:
          - unique
          - not_null
      - name: call_id
        description: Fathom recording id.
        tests:
          - not_null
      - name: segment_index
        description: Zero-based segment position within the Fathom transcript.
        tests:
          - not_null
      - name: segment_offset_seconds
        description: Segment offset from the start of the recording, in seconds when supplied by Fathom.
      - name: speaker_name
        description: Fathom's speaker display label for this segment.
      - name: speaker_email_norm
        description: Lowercased matched calendar invitee email for the speaker, when Fathom can resolve it.
      - name: segment_text
        description: Spoken text for this transcript segment.
      - name: segment_json
        description: Raw transcript segment JSON.
      - name: _ingested_at
        description: Wall-clock UTC time this row landed in BigQuery.

  - name: stg_fathom__call_invitees
    description: >
      Source-shaped child extraction from `Raw.fathom_calls_raw`:
      one row per calendar invitee embedded in a Fathom call payload. This
      preserves the raw call invitee identities so downstream marts can match
      a buyer's email directly to the Fathom sales call they attended, instead
      of relying only on Calendly/GHL booking joins.
    columns:
      - name: call_invitee_sk
        description: Surrogate key over call id, participant email, participant name, and internal/external flag.
        tests:
          - unique
          - not_null
      - name: call_id
        description: Fathom recording id.
        tests:
          - not_null
      - name: participant_email_norm
        description: Lowercased and trimmed participant email, used for direct contact matching.
      - name: participant_name
        description: Participant display name from Fathom's calendar invitee payload.
      - name: is_external
        description: Whether Fathom classified this invitee as external to the workspace.
      - name: participant_json
        description: Raw participant JSON object from `$.calendar_invitees[]`.
