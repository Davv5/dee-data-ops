version: 2

models:

  - name: speed_to_lead_detail
    description: |
      Wide mart for the Speed-to-Lead domain. Grain: one row per (booking × touch-event).
      Bookings with no SDR touch emit ONE row with touched_at = NULL.
      Downstream consumers: Metabase Speed-to-Lead dashboard (all cards on Page 1 after F2 rewire).
      Sibling mart `sales_activity_detail` is preserved for Page 2/Page 3 dashboards.
      Column order is frozen as the BI-layer contract — new columns added at the END only.
      Source: "How to Create a Data Modeling Pipeline (3 Layer Approach)", Data Ops notebook.
    columns:
      - name: speed_to_lead_touch_id
        description: Surrogate PK. Hash of (booking_sk, coalesce(touch_sk, 'no-touch')). Mart-layer rename of fct_speed_to_lead_touch.speed_to_lead_touch_sk.
        tests:
          - unique
          - not_null
      - name: booking_id
        description: Surrogate FK to fct_calls_booked. Mart-layer rename of booking_sk.
        tests:
          - not_null
      - name: contact_id
        description: GHL contact_id. NULL if contact row missing (pre-attribution era data gap).
      - name: email
        description: Contact email address.
      - name: full_name
        description: Contact full name.
      - name: booked_at
        description: Timestamp when the Calendly booking was created. Partition key.
      - name: scheduled_for
        description: Scheduled start time of the call. NULL if not available.
      - name: booked_date
        description: Date portion of booked_at. Field-Filter-friendly for Metabase date filters.
      - name: event_status
        description: Calendly event_status (active / cancelled).
      - name: cancelled_at
        description: Timestamp of cancellation. NULL if not cancelled.
      - name: sdr_name
        description: Name of the SDR who placed the first outbound touch. NULL for no-touch rows.
      - name: sdr_email
        description: Email of the SDR. NULL for no-touch rows.
      - name: touched_at
        description: Timestamp of the touch event. NULL for no-touch rows.
      - name: channel
        description: Touch channel (CALL, SMS, etc.). NULL for no-touch rows.
      - name: minutes_to_touch
        description: Minutes between booked_at and touched_at. NULL for no-touch rows.
      - name: is_first_touch
        description: TRUE on the OVERALL earliest outbound touch row per booking, regardless of toucher role. FALSE for subsequent touches and no-touch rows. Pair with `is_sdr_touch` to scope to "first SDR toucher" (reproduces the legacy 2026-04-19 locked metric semantics).
      - name: is_within_5_min_sla
        description: TRUE when is_first_touch=TRUE AND is_sdr_touch=TRUE AND minutes_to_touch < 5. The headline Speed-to-Lead numerator.
      - name: had_any_sdr_activity_within_1_hr
        description: TRUE if any SDR activity occurred within 60 minutes of booked_at, regardless of touch order.
      - name: is_sdr_touch
        description: TRUE when the touching user's role = 'SDR'. FALSE for non-SDR or NULL toucher.
      - name: lead_source
        description: Lead source label from dim_source. NULL entries resolve to '__unknown__' via dim_source sentinel row.
      - name: source_description
        description: Human-readable description of the lead source from stl_lead_source_lookup seed.
      - name: is_paid_source
        description: TRUE = paid channel, FALSE = organic, NULL = unclassified (approx 88% of rows — campaign labels not yet seeded). See WORKLOG 2026-04-22 for F3 classification plan.
      - name: show_outcome
        description: "v1 heuristic from Calendly event_status + GHL stage-change signal. Values: showed / no_show / cancelled / pending. See fct_speed_to_lead_touch header comment for derivation detail."
      - name: close_outcome
        description: "won / lost / pending based on GHL opportunity status."
      - name: closed_at
        description: Timestamp when opportunity was won or lost. NULL if still pending.
      - name: cycle_time_booking_to_close_min
        description: Minutes from booked_at to closed_at for won opportunities.
      - name: lost_reason
        description: GHL lost_reason_id. NULL if not lost.
      - name: attribution_quality_flag
        description: "Data quality tier: clean / no_sdr_touch / pre_utm_era / role_unknown."
        tests:
          - accepted_values:
              values: ['clean', 'no_sdr_touch', 'pre_utm_era', 'role_unknown']
      - name: attribution_era
        description: UTM coverage era for the contact. Values from dim_contacts.
      - name: era_flag
        description: "ramping (booked_at < 2026-03-16) or stable. Used to exclude the ramp period from trend analysis."
      - name: pipeline_name
        description: GHL pipeline name. NULL in dev (fct_calls_booked.pipeline_stage_sk is stubbed NULL until GHL stage-sync ships).
      - name: stage_name
        description: GHL pipeline stage name. NULL in dev.
      - name: is_booked_stage
        description: TRUE when the pipeline stage is a booking-confirmation stage. NULL in dev.
      - name: days_since_stage_change
        description: Days since the last GHL stage change. Always NULL (booking-level signal not available on dim_pipeline_stages; reserved for a future fact-level computation).
      - name: first_touch_campaign
        description: UTM campaign of the first marketing touch. NULL until Track E invitee staging ships.
      - name: first_touch_source
        description: UTM source of the first marketing touch. NULL until Track E invitee staging ships.
      - name: first_touch_medium
        description: UTM medium of the first marketing touch. NULL until Track E invitee staging ships.
      - name: last_touch_campaign
        description: UTM campaign of the last marketing touch before booking. NULL until Track E invitee staging ships.
      - name: last_touch_source
        description: UTM source of the last marketing touch. NULL until Track E invitee staging ships.
      - name: last_touch_medium
        description: UTM medium of the last marketing touch. NULL until Track E invitee staging ships.
      - name: client
        description: Tenant identifier. Hard-coded 'Dee' for v1 single-tenant. Widen when multi-tenant ships.
      - name: mart_refreshed_at
        description: Timestamp when this mart row was last built (current_timestamp() at dbt build time).

  - name: sales_activity_detail
    description: |
      Booked-call grain Speed-to-Lead mart. One row per Calendly booking event (~3,141 rows vs oracle).
      Powers Page 1 of the D-DEE dashboard. See `_marts__docs.md` for full column documentation.
    columns:
      - name: booking_id
        description: Primary key — surrogate from `fct_calls_booked.booking_sk`.
        tests:
          - unique
          - not_null
      - name: attribution_quality_flag
        tests:
          - accepted_values:
              values: ['clean', 'no_sdr_touch', 'ambiguous_contact_match', 'pre_utm_era', 'role_unknown']

  - name: lead_journey
    description: |
      Contact grain "golden lead" mart — one row per GHL contact whether booked or not (~15,598 rows vs oracle).
      Widest mart in the project. Powers Page 2 of the dashboard (funnel, attribution, psychographic,
      applicant→booker conversion, lost-reason, multi-touch). See `_marts__docs.md` for column documentation.
    columns:
      - name: contact_id
        description: Primary key — GHL contact_id, 1:1 with `dim_contacts`.
        tests:
          - unique
          - not_null
      - name: attribution_quality_flag
        tests:
          - accepted_values:
              values: ['clean', 'no_sdr_touch', 'ambiguous_contact_match', 'pre_utm_era', 'role_unknown']

  - name: revenue_detail
    description: |
      Payment grain mart — one row per Stripe/Fanbasis payment event (~1,423 rows vs oracle).
      Unmatched rows stay visible (not quarantined) so the Page 3 unmatched-revenue tile stays honest.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: payment_id
        description: Primary key — source-system identifier (Stripe charge_id or Fanbasis equivalent).
        tests:
          - unique
          - not_null
      - name: source_platform
        description: Payment processor — `stripe` or `fanbasis`.
        tests:
          - not_null
          - accepted_values:
              values: ['stripe', 'fanbasis']
      - name: match_method
        description: Identity-bridge tier used to link this payment to a contact (or `unmatched`).
        tests:
          - accepted_values:
              values: ['email_exact', 'email_canonical', 'phone_last10', 'billing_email_direct', 'unmatched']
      - name: match_status
        description: Overall bridge outcome — alias of bridge_identity_contact_payment.bridge_status.
        tests:
          - accepted_values:
              values: ['matched', 'ambiguous_multi_candidate', 'unmatched']
      - name: attribution_quality_flag
        tests:
          - accepted_values:
              values: ['clean', 'unmatched', 'ambiguous_contact_match', 'role_unknown']
      - name: refunds_total_amount
        description: Sum of `fct_refunds.refund_amount` for this payment (gross refund returned to the customer). 0 when no refunds; never NULL.
        tests:
          - not_null
      - name: refunds_total_amount_net
        description: Sum of `fct_refunds.refund_amount_net` for this payment (refund net of refund-side fees). 0 when no refunds; never NULL.
        tests:
          - not_null
      - name: refunds_count
        description: Number of refund events tied to this payment. 0 when none; never NULL.
        tests:
          - not_null
      - name: net_amount_after_refunds
        description: |
          `net_amount - refunds_total_amount`. For Stripe rows this equals `net_amount` because Stripe net is already net of refunds at staging
          (`amount_captured_minor - amount_refunded_minor`) and `fct_refunds` is Fanbasis-only today. If `fct_refunds` extends to Stripe, the
          calculation in `revenue_detail.sql` must be revisited.
        tests:
          - not_null
