version: 2

models:

  - name: fanbasis_missing_ghl_contacts
    description: >
      Operator queue for Fanbasis paid buyers who exist in Fanbasis customer
      and subscriber identity but still do not resolve to a GHL contact.
      Grain: one row per Fanbasis customer/email identity needing GHL creation
      or identity repair.
    columns:
      - name: missing_ghl_contact_sk
        description: Surrogate key over Fanbasis customer id + buyer email.
        tests:
          - unique
          - not_null
      - name: fanbasis_customer_id
        description: Fanbasis subscriber/customer id from transaction `fan_id`.
      - name: fanbasis_directory_customer_id
        description: Fanbasis customer-directory id from `/public-api/customers`.
      - name: buyer_name
        description: Best available Fanbasis buyer name.
      - name: buyer_email
        description: Best available Fanbasis buyer email.
      - name: buyer_email_norm
        description: Lowercased / trimmed buyer email.
        tests:
          - not_null
      - name: paid_payments_count
        description: Paid Fanbasis payments still missing GHL contact attribution.
        tests:
          - not_null
      - name: total_net_revenue
        description: Net paid Fanbasis revenue attached to the missing identity.
        tests:
          - not_null
      - name: subscription_status
        description: Latest Fanbasis subscriber status for this customer when available.
      - name: recommended_action
        description: Action needed to close the source-depth gap.
        tests:
          - accepted_values:
              arguments:
                values: ['create_ghl_contact', 'repair_identity_bridge', 'review_duplicate_ghl_contacts']
      - name: suggested_ghl_contact_payload_json
        description: JSON string with a safe draft GHL contact payload for review/import.
      - name: mart_refreshed_at
        description: Build timestamp for freshness diagnostics.

  - name: customer_action_queue
    description: |
      Customer-action mart — one row per customer x action surface.
      Combines Revenue, Retention, and Contract Terms action candidates with
      the dashboard-written operator review ledgers so dashboards and future
      action-handler agents can read one queue instead of recreating action
      logic. Current owner is explicitly unknown until a real assignment source
      is modeled.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: customer_action_id
        description: Primary key — surrogate over contact, area, queue, and action bucket.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: Matched paid contact surrogate key from `dim_contacts`.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_contacts')
                field: contact_sk
      - name: contact_id
        description: Native GHL contact id.
      - name: customer_display_name
        description: Best available customer label for operator screens.
        tests:
          - not_null
      - name: action_area
        description: Dashboard/action domain that produced the row.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['revenue', 'retention', 'contract_terms']
      - name: queue_name
        description: Review ledger queue name used to close/reopen the action.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['revenue_action_queue', 'retention_worklist']
      - name: action_bucket
        description: Stable action key used by the operator review ledger.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['data_risk', 'product_cleanup', 'attribution_gap', 'payment_plan_review', 'failed_plan_recovery_needed', 'active_plan_due_no_payment_yet', 'one_time_upsell_candidate', 'completed_plan_paid_off', 'historical_stripe_product_review', 'active_plan_not_yet_due', 'repeat_payment_observed', 'review_negative_value', 'manual_collection_stale_review', 'collection_call_no_payment_review', 'plan_named_collection_review', 'repeat_or_upsell_review', 'manual_collection_recently_collected', 'contract_terms_review']
      - name: action_label
        description: Human-facing label for the action bucket.
        tests:
          - not_null
      - name: action_reason
        description: Plain-English reason this customer is in the queue.
        tests:
          - not_null
      - name: priority_rank
        description: Numeric priority; lower is more urgent.
        tests:
          - not_null
      - name: priority_label
        description: Coarse priority label for operator/agent routing.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['high', 'medium', 'low']
      - name: recommended_channel
        description: Suggested first route — contact, audit, monitor, or missing route.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['audit_first', 'call_text', 'email', 'missing_contact_route', 'monitor']
      - name: source_table
        description: Mart that produced the action candidate.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['revenue_funnel_detail', 'customer_retention_detail', 'collection_contract_evidence_detail']
      - name: money_at_stake
        description: Customer net revenue attached to the action row.
        tests:
          - not_null
      - name: revenue_credit_name
        description: Credited closer / revenue credit label; not current action owner.
        tests:
          - not_null
      - name: credited_setter_name
        description: Credited setter / first-touch label when known.
      - name: current_owner_name
        description: Current follow-up owner. Currently explicit `Unknown`.
        tests:
          - not_null
      - name: current_owner_source
        description: Source for current follow-up owner. Currently `not_modeled_yet`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['not_modeled_yet']
      - name: review_status
        description: Latest operator review status; defaults to `open`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['open', 'reviewed', 'fixed', 'wont_fix']
      - name: is_action_open
        description: Whether this action still needs operator/agent attention.
        tests:
          - not_null
      - name: has_confirmed_contract_terms
        description: Whether contract terms have been confirmed in the app ledger.
        tests:
          - not_null
      - name: mart_refreshed_at
        description: Build timestamp for freshness diagnostics.

  - name: lead_journey
    description: |
      Contact grain "golden lead" mart — one row per GHL contact whether booked or not (~15,598 rows vs oracle).
      Widest mart in the project. Powers Page 2 of the dashboard (funnel, attribution, psychographic,
      applicant→booker conversion, lost-reason, multi-touch). See `_marts__docs.md` for column documentation.
    columns:
      - name: contact_id
        description: Primary key — GHL contact_id, 1:1 with `dim_contacts`.
        tests:
          - unique
          - not_null
      - name: attribution_quality_flag
        tests:
          - accepted_values:
              arguments:
                values: ['clean', 'no_sdr_touch', 'ambiguous_contact_match', 'pre_utm_era', 'role_unknown']

  - name: revenue_detail
    description: |
      Payment grain mart — one row per Stripe/Fanbasis payment event (~1,423 rows vs oracle).
      Unmatched rows stay visible (not quarantined) so the Page 3 unmatched-revenue tile stays honest.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: payment_id
        description: Primary key — source-system identifier (Stripe charge_id or Fanbasis equivalent).
        tests:
          - unique
          - not_null
      - name: source_platform
        description: Payment processor — `stripe` or `fanbasis`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['stripe', 'fanbasis']
      - name: match_method
        description: Identity-bridge tier used to link this payment to a contact (or `unmatched`).
        tests:
          - accepted_values:
              arguments:
                values: ['email_exact', 'email_canonical', 'phone_last10', 'stripe_customer_email', 'stripe_customer_phone', 'fanbasis_conversation_email', 'fanbasis_unique_crm_name', 'billing_email_direct', 'unmatched']
      - name: match_status
        description: Overall bridge outcome — alias of bridge_identity_contact_payment.bridge_status.
        tests:
          - accepted_values:
              arguments:
                values: ['matched', 'payment_identity_only', 'ambiguous_multi_candidate', 'unmatched']
      - name: attribution_quality_flag
        tests:
          - accepted_values:
              arguments:
                values: ['clean', 'unmatched', 'ambiguous_contact_match', 'payment_identity_only', 'role_unknown']
      - name: refunds_total_amount
        description: Sum of `fct_refunds.refund_amount` for this payment (gross refund returned to the customer). 0 when no refunds; never NULL.
        tests:
          - not_null
      - name: refunds_total_amount_net
        description: Sum of `fct_refunds.refund_amount_net` for this payment (refund net of refund-side fees). 0 when no refunds; never NULL.
        tests:
          - not_null
      - name: refunds_count
        description: Number of refund events tied to this payment. 0 when none; never NULL.
        tests:
          - not_null
      - name: net_amount_after_refunds
        description: |
          Net of refunds. Branches by `source_platform`: Stripe rows return `net_amount` directly because Stripe net is already net of refunds
          at staging (`amount_captured_minor - amount_refunded_minor`); Fanbasis (and any future non-Stripe arm) rows return
          `net_amount - refunds_total_amount`. Mechanical branching keeps the math correct even if `fct_refunds` extends to Stripe later.
        tests:
          - not_null

  - name: lead_magnet_detail
    description: |
      Opportunity-grain lead magnet mart — one row per GHL opportunity, treating each GHL pipeline as a lead-magnet funnel.
      Uses opportunity windows to attribute outreach, bookings, and net revenue without double-counting multi-magnet contacts.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: opportunity_id
        description: Primary key — native GHL opportunity id.
        tests:
          - unique
          - not_null
      - name: lead_magnet_id
        description: GHL pipeline id; the durable lead-magnet/funnel identifier.
        tests:
          - not_null
      - name: lead_magnet_name
        description: Business-facing GHL pipeline name for the lead magnet/funnel.
        tests:
          - not_null
      - name: lead_magnet_reporting_name
        description: Clean dashboard label from `lead_magnet_pipeline_taxonomy`.
        tests:
          - not_null
      - name: lead_magnet_category
        description: Taxonomy class for comparing similar pipeline types.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['true_lead_magnet', 'launch_event', 'waitlist', 'sales_operating_pipeline', 'uncategorized']
      - name: lead_magnet_offer_type
        description: Creative/package format of the offer, such as template, guide, training, prompt pack, or sales pipeline.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['prompt_pack', 'template', 'guide_or_doc', 'resource_list', 'training_or_class', 'video_or_replay', 'giveaway', 'community', 'waitlist', 'sales_pipeline', 'launch_event', 'uncategorized']
      - name: contact_id
        description: Native GHL contact id attached to the opportunity.
        tests:
          - not_null
      - name: attribution_quality_flag
        tests:
          - accepted_values:
              arguments:
                values: ['clean', 'contact_not_matched', 'pipeline_not_mapped', 'multi_magnet_contact']
      - name: touches_count
        tests:
          - not_null
      - name: direct_bookings_count
        tests:
          - not_null
      - name: window_bookings_count
        tests:
          - not_null
      - name: payment_count
        tests:
          - not_null
      - name: net_revenue_after_refunds
        tests:
          - not_null

  - name: lead_magnet_buyer_detail
    description: |
      Buyer-grain lead magnet mart — one row per matched paid contact.
      Connects first purchase, total collected revenue, payment-plan behavior,
      bookings before purchase, and the latest known lead magnet before first purchase.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: contact_sk
        description: Primary key — warehouse contact surrogate key for a matched paid buyer.
        tests:
          - unique
          - not_null
      - name: contact_id
        description: Native GHL contact id for the buyer.
        tests:
          - not_null
      - name: first_payment_id
        description: First paid payment id for this buyer.
        tests:
          - not_null
      - name: first_purchase_at
        description: Timestamp of the buyer's first paid payment.
        tests:
          - not_null
      - name: first_purchase_net_revenue
        tests:
          - not_null
      - name: total_net_revenue_after_refunds
        tests:
          - not_null
      - name: paid_payments_count
        tests:
          - not_null
      - name: bookings_before_first_purchase_count
        tests:
          - not_null
      - name: purchase_magnet_attribution_flag
        tests:
          - accepted_values:
              arguments:
                values: ['latest_prior_magnet', 'purchase_before_first_magnet', 'no_known_magnet', 'missing_taxonomy', 'uncategorized_offer_type']

  - name: revenue_funnel_detail
    description: |
      Buyer-journey revenue mart — one row per matched paid contact.
      Connects collected revenue, payment-plan signal, product family,
      latest magnet before purchase, bookings, pre-purchase outreach, and
      credited closer / setter attribution.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: contact_sk
        description: Primary key — warehouse contact surrogate key for a matched paid buyer.
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_contacts')
                field: contact_sk
      - name: contact_id
        description: Native GHL contact id for the buyer.
        tests:
          - not_null
      - name: first_payment_id
        description: First paid payment id for this buyer.
        tests:
          - not_null
      - name: first_purchase_at
        description: Timestamp of the buyer's first paid payment.
        tests:
          - not_null
      - name: latest_purchase_at
        description: Timestamp of the buyer's latest paid payment.
        tests:
          - not_null
      - name: paid_payments_count
        description: Paid payment events attached to the buyer.
        tests:
          - not_null
      - name: total_net_revenue_after_refunds
        description: Buyer-level net revenue after source-specific refund treatment.
        tests:
          - not_null
      - name: payment_plan_status
        description: Payment-plan signal derived from payment count, Fanbasis auto-renew, and plan-named product strings.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['auto_renew_plan', 'multi_payment_plan', 'plan_named_single_payment', 'single_payment']
      - name: payment_plan_truth_status
        description: Source-truth label that distinguishes collected-cash evidence from missing subscription-schedule evidence.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['fanbasis_auto_renew_cash_only', 'name_inferred_plan_cash_only', 'fanbasis_single_payment_cash', 'historical_stripe_cash_only', 'unknown_cash_only']
      - name: fanbasis_net_revenue_after_refunds
        description: Fanbasis-only collected net revenue after refunds attached to the buyer.
        tests:
          - not_null
      - name: fanbasis_auto_renew_payments_count
        description: Fanbasis payments with `payment_method = auto_renew`; this signals recurring/plan cash but not the remaining receivable schedule.
        tests:
          - not_null
      - name: fanbasis_unreleased_payments_count
        description: Fanbasis payments whose payout release flag is false.
        tests:
          - not_null
      - name: top_product_family
        description: Product-family label for the buyer's top product by net revenue.
        tests:
          - not_null
      - name: purchase_magnet_attribution_flag
        description: Lead-magnet attribution state inherited from `lead_magnet_buyer_detail`.
        tests:
          - accepted_values:
              arguments:
                values: ['latest_prior_magnet', 'purchase_before_first_magnet', 'no_known_magnet', 'missing_taxonomy', 'uncategorized_offer_type']
      - name: best_available_operator_name
        description: Best available operator for the buyer journey, prioritizing successful call, first touch, latest prior owner, then booking owner.
        tests:
          - not_null
      - name: best_available_operator_source
        description: Source used to pick the best available operator.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['first_successful_call_before_purchase', 'first_touch_before_purchase', 'latest_prior_opportunity_owner', 'latest_booking_event_name_operator', 'latest_booking_owner', 'unassigned']
      - name: credited_closer_name
        description: Best-known closer or sales-call owner tied to the buyer before money came in.
        tests:
          - not_null
      - name: credited_closer_source
        description: Source used to pick credited closer identity.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['latest_prior_opportunity_closer', 'fathom_contact_email_revenue_call_recorder', 'fathom_revenue_call_recorder', 'latest_booking_closer', 'fathom_transcript_self_intro_closer', 'latest_booking_event_name_closer', 'latest_booking_calendly_host_closer', 'latest_prior_opportunity_owner', 'calendly_host_for_fathom_team_account', 'fathom_contact_email_team_account', 'fathom_contact_email_recorder', 'fathom_call_recorder', 'latest_booking_owner', 'latest_booking_event_name_operator', 'latest_booking_calendly_host', 'unassigned']
      - name: credited_closer_confidence
        description: Confidence tier for credited closer attribution.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['high', 'medium', 'low', 'missing']
      - name: credited_setter_name
        description: Best-known setter / first-touch identity tied to the buyer before money came in.
        tests:
          - not_null
      - name: credited_setter_source
        description: Source used to pick credited setter identity.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['first_successful_call_before_purchase', 'first_touch_before_purchase', 'unassigned']
      - name: contact_email_fathom_call_id
        description: >
          Latest revenue-relevant Fathom call within 90 days before purchase
          where the buyer's contact email appears as an external calendar
          invitee. This is independent of Calendly/GHL booking linkage.
      - name: contact_email_fathom_identity_type
        description: >
          Identity source for the direct contact-email Fathom recorder:
          `dim_users`, an alternate email, a Fathom-only user, or a team account.
      - name: contact_email_fathom_identity_confidence
        description: Confidence tier for the direct contact-email Fathom recorder identity.
      - name: contact_email_calendly_host_user_name
        description: >
          Calendly host/calendar account matched to the direct buyer-email
          Fathom call via scheduled-event membership.
      - name: contact_email_calendly_host_identity_type
        description: Identity source for the Calendly host/calendar account.
      - name: contact_email_calendly_host_identity_confidence
        description: Confidence tier for the Calendly host/calendar account identity.
      - name: transcript_closer_user_name
        description: >
          Closer inferred from a conservative Fathom transcript self-introduction
          pattern on a team-account recording.
      - name: transcript_closer_evidence_text
        description: Transcript segment text that matched the self-introduction pattern.
      - name: transcript_closer_identity_type
        description: Identity source used for the transcript self-introduction match, such as a GHL first name or transcript-only speech alias.
      - name: transcript_closer_identity_confidence
        description: Confidence tier for the transcript self-introduction identity.
      - name: latest_booking_event_name
        description: Calendly event title on the latest booking before purchase.
      - name: latest_booking_event_name_operator_name
        description: >
          Operator inferred when the latest Calendly booking title ends with a
          rostered parenthetical name, such as `(Hammad)`.
      - name: latest_booking_event_name_operator_identity_type
        description: Identity source for the booking-title operator match.
      - name: latest_booking_event_name_operator_identity_confidence
        description: Confidence tier for the booking-title operator match.
      - name: latest_booking_calendly_host_user_name
        description: >
          Calendly host account or user on the latest booking before purchase.
          Used as a fallback when direct closer evidence is missing.
      - name: latest_booking_calendly_host_identity_type
        description: Identity source for the latest booking Calendly host.
      - name: latest_booking_calendly_host_identity_confidence
        description: Confidence tier for the latest booking Calendly host identity.
      - name: pre_purchase_funnel_path
        description: Highest-known pre-purchase path signal for the buyer.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['booked_before_purchase', 'canceled_booking_before_purchase', 'reached_by_phone_before_purchase', 'worked_before_purchase', 'magnet_before_purchase_no_work_logged', 'buyer_without_known_pre_purchase_path']
      - name: revenue_funnel_quality_flag
        description: Data-quality bucket for the buyer journey row.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['clean', 'missing_taxonomy', 'uncategorized_offer_type', 'negative_net_revenue', 'contact_not_matched', 'no_known_magnet']

  - name: canceled_booking_recovery_detail
    description: |
      Canceled-booking recovery mart — one row per canceled Calendly booking.
      Tracks whether the contact later rebooked, has a likely show signal,
      has Fathom recorded-call evidence, or bought after cancellation.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: canceled_booking_sk
        description: Primary key — booking surrogate key from `fct_calls_booked` for the canceled Calendly event.
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('fct_calls_booked')
                field: booking_sk
      - name: contact_sk
        description: Nullable FK to `dim_contacts.contact_sk`; null when the canceled booking invitee email did not match GHL.
        tests:
          - relationships:
              arguments:
                to: ref('dim_contacts')
                field: contact_sk
      - name: cancelled_by_type
        description: Calendly cancellation actor type, usually `host` or `invitee`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['host', 'invitee', 'unknown']
      - name: canceled_booking_sequence
        description: Sequence number of canceled bookings for this contact; used to credit post-cancel revenue once per buyer.
        tests:
          - not_null
      - name: fathom_calls_near_next_booking
        description: Fathom calls within 15 minutes of the next active booking's scheduled start.
        tests:
          - not_null
      - name: revenue_fathom_calls_near_next_booking
        description: Revenue-relevant Fathom calls within 15 minutes of the next active booking's scheduled start.
        tests:
          - not_null
      - name: total_net_revenue_after_cancel
        description: Buyer net revenue when first purchase happened after this cancellation; 0 otherwise.
        tests:
          - not_null
      - name: credited_net_revenue_after_first_cancel
        description: Buyer net revenue credited only to the first canceled booking for a contact, preventing duplicated recovery revenue.
        tests:
          - not_null
      - name: has_rebooked_after_cancel
        description: Whether the contact had a later active Calendly booking after this canceled booking was created.
        tests:
          - not_null
      - name: has_likely_show_after_cancel
        description: Whether the next active booking is due and not marked no-show. This is a show signal, not full attendance truth.
        tests:
          - not_null
      - name: has_fathom_show_evidence
        description: Stronger show evidence from a revenue-relevant Fathom call near the next active booking time.
        tests:
          - not_null
      - name: had_purchase_after_cancel
        description: Whether the contact's first purchase happened after this cancellation.
        tests:
          - not_null
      - name: recovery_outcome
        description: Highest-known recovery state after the canceled booking.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['contact_not_matched', 'bought_after_cancel', 'fathom_show_after_cancel', 'rebooked_pending', 'rebooked_no_show', 'likely_show_after_cancel', 'not_recovered_yet']
      - name: mart_refreshed_at
        description: Build timestamp for freshness diagnostics.

  - name: customer_retention_detail
    description: |
      Customer-month retention mart — one row per matched paid contact per
      calendar month from first purchase through the current month.
      Uses paid/refund activity as the cash spine and Fanbasis subscriber /
      customer rows as supporting lifecycle evidence.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: customer_retention_sk
        description: Primary key — surrogate over `contact_sk` and `activity_month`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: Matched paid contact surrogate key from `dim_contacts`.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_contacts')
                field: contact_sk
      - name: cohort_month
        description: First day of the buyer's first purchase month.
        tests:
          - not_null
      - name: activity_month
        description: First day of the retained customer activity month.
        tests:
          - not_null
      - name: months_since_first_purchase
        description: Month offset from cohort month; first purchase month is 0.
        tests:
          - not_null
      - name: paid_payments_in_month
        description: Paid payment events observed in this activity month.
        tests:
          - not_null
      - name: refunds_amount_in_month
        description: Fanbasis refund amount observed in this activity month.
        tests:
          - not_null
      - name: net_revenue_after_refunds_in_month
        description: Monthly payment net less refund events observed in the same month.
        tests:
          - not_null
      - name: cumulative_net_revenue_after_refunds
        description: Running customer LTV through this activity month.
        tests:
          - not_null
      - name: lifetime_net_revenue_after_refunds
        description: Buyer lifetime net revenue inherited from `revenue_funnel_detail`.
        tests:
          - not_null
      - name: retention_state
        description: Highest-known retention state for this customer-month.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['new_paid_month', 'repeat_paid_month', 'refund_only_month', 'active_subscriber_current_month_no_payment', 'post_latest_payment_month', 'observed_gap_month']
      - name: customer_lifecycle_status
        description: Current best lifecycle bucket, using Fanbasis subscriber evidence when present.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['active_fanbasis_subscription', 'completed_fanbasis_subscription', 'failed_fanbasis_subscription', 'one_time_fanbasis_customer', 'fanbasis_transaction_no_subscriber_record', 'historical_stripe_or_no_subscriber_record']
      - name: retention_quality_flag
        description: Data-quality bucket for retention/product/source-depth caveats.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['clean', 'missing_product_family', 'no_subscriber_record', 'negative_lifetime_value']
      - name: repeat_payment_type
        description: >
          Classification of what repeat payment evidence means: installment,
          upsell, same-product repeat, or no repeat yet.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['fanbasis_auto_renew_or_installment', 'fanbasis_subscription_installment', 'multi_product_repeat_or_upsell', 'same_product_multi_payment', 'active_subscription_no_repeat_paid_yet', 'failed_subscription_no_repeat_paid', 'completed_subscription_no_repeat_paid', 'historical_stripe_single_payment', 'single_payment_no_repeat']
      - name: payment_plan_health_status
        description: Operator-facing payment-plan / renewal health bucket for current actionability.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['review_negative_value', 'failed_plan_recovery_needed', 'active_plan_paid_current_month', 'active_plan_due_no_payment_yet', 'active_plan_not_yet_due', 'completed_plan_paid_off', 'repeat_payment_observed', 'one_time_upsell_candidate', 'historical_stripe_product_review', 'no_repeat_expected_yet']
      - name: collection_motion_type
        description: >
          Customer-level collection pattern separating automated Fanbasis plans,
          manual follow-up payment collection, possible upsells, and no
          post-first-payment collection signal.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['automated_fanbasis_plan', 'manual_collection_or_upsell', 'manual_payment_plan_collected', 'collection_call_scheduled_no_repeat_payment', 'plan_named_cash_only', 'single_payment_no_collection_signal']
      - name: collection_health_status
        description: Operator-facing collections bucket that keeps follow-up collection separate from initial close attribution.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['review_negative_value', 'automated_plan_failed_recovery', 'automated_plan_due_no_payment', 'automated_plan_monitor', 'repeat_or_upsell_review', 'manual_collection_recently_collected', 'manual_collection_stale_review', 'collection_call_no_payment_review', 'plan_named_collection_review', 'no_collection_signal']
      - name: post_first_collected_net_revenue
        description: Net paid amount collected after the first payment row; proxy for manual payment-plan collection, not contractual balance owed.
        tests:
          - not_null
      - name: post_first_paid_payments_count
        description: Count of paid payment rows after the first payment row.
        tests:
          - not_null
      - name: post_first_purchase_collection_bookings_count
        description: Post-first-payment Calendly bookings whose event name looks collection/checkup/follow-up related.
        tests:
          - not_null
      - name: retention_operator_next_action
        description: Suggested operating action implied by payment-plan health.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['recover_failed_payment', 'collect_due_payment', 'watch_next_due_date', 'monitor_active_plan', 'upsell_completed_customer', 'upsell_one_time_customer', 'repair_historical_product', 'review_refund_or_chargeback', 'review_manual_collection', 'confirm_repeat_or_upsell', 'monitor_manual_collection', 'monitor_repeat_customer', 'monitor']
      - name: mart_refreshed_at
        description: Build timestamp for freshness diagnostics.

  - name: collection_contract_evidence_detail
    description: |
      Customer-grain collection evidence mart — one row per current matched
      paid customer. Shows collected cash, product bought, manual collection
      signal, and conservative Fathom transcript payment-term evidence without
      inventing remaining contract value.
      See `_marts__docs.md` for column documentation.
    columns:
      - name: collection_contract_evidence_sk
        description: Primary key — surrogate over `contact_sk`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: Matched paid contact surrogate key from `dim_contacts`.
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_contacts')
                field: contact_sk
      - name: contact_id
        description: Native GHL contact id for the customer.
        tests:
          - not_null
      - name: lifetime_net_revenue_after_refunds
        description: Total collected net cash after refunds for this customer.
        tests:
          - not_null
      - name: upfront_collected_net_revenue
        description: Net amount collected on the first paid payment row.
        tests:
          - not_null
      - name: post_first_collected_net_revenue
        description: Net amount collected after the first paid payment row.
        tests:
          - not_null
      - name: top_product_by_net_revenue
        description: Product with the most net collected revenue for the customer.
      - name: top_product_family
        description: Product-family label for the top revenue product.
        tests:
          - not_null
      - name: collection_motion_type
        description: Collection pattern inherited from `customer_retention_detail`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['automated_fanbasis_plan', 'manual_collection_or_upsell', 'manual_payment_plan_collected', 'collection_call_scheduled_no_repeat_payment', 'plan_named_cash_only', 'single_payment_no_collection_signal']
      - name: collection_health_status
        description: Operator-facing collections health bucket.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['review_negative_value', 'automated_plan_failed_recovery', 'automated_plan_due_no_payment', 'automated_plan_monitor', 'repeat_or_upsell_review', 'manual_collection_recently_collected', 'manual_collection_stale_review', 'collection_call_no_payment_review', 'plan_named_collection_review', 'no_collection_signal']
      - name: candidate_sales_calls_count
        description: Candidate Fathom sales calls searched for payment-term evidence.
        tests:
          - not_null
      - name: payment_terms_calls_count
        description: Candidate calls with payment-term transcript evidence.
        tests:
          - not_null
      - name: payment_terms_snippets_count
        description: Transcript snippets matching amount + payment context.
        tests:
          - not_null
      - name: mentioned_payment_amounts_count
        description: Distinct plausible payment amounts mentioned in matched snippets.
        tests:
          - not_null
      - name: has_payment_terms_transcript_evidence
        description: Whether a candidate sales call includes payment-term evidence.
        tests:
          - not_null
      - name: contract_evidence_status
        description: Coverage status for transcript payment-term evidence.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['transcript_payment_terms_found', 'sales_call_found_no_payment_terms', 'no_sales_call_transcript']
      - name: contract_evidence_truth_note
        description: Caveat explaining transcript evidence versus receivable truth.
        tests:
          - not_null
      - name: mart_refreshed_at
        description: Build timestamp for freshness diagnostics.
