# Repo-local profiles.yml. dbt finds this via DBT_PROFILES_DIR=./dbt
# (set in .env). Secrets live in .env, loaded into the shell before `dbt` runs.
#
# Targets (post-U2 retarget, 2026-04-23):
#   dev        → consolidated project, dev_<user> schema; SA-keyfile auth
#   ci         → consolidated project, ci / ci_pr_<num> schema; SA-keyfile auth
#   prod       → consolidated project, per-layer schemas via generate_schema_name
#   dev_local  → mirror of `dev`, but uses ADC (oauth) instead of an SA keyfile
#   ci_local   → mirror of `ci`, but uses ADC (oauth) instead of an SA keyfile
#
# Pick a target by auth context:
#   - GH Actions:        ci (PR builds) / prod (deploys, snapshots, docs).
#                        `dev` is NOT used in any workflow; it's local-only.
#   - Local with SA key: dev / ci         (BQ_KEYFILE_PATH must be set in .env)
#   - Local with ADC:    dev_local / ci_local
#                        (run `gcloud auth application-default login` once;
#                        also driven by `2-dbt/scripts/local-ci.sh`)
#
# All targets point at the consolidated GCP project per the 2026-04-23
# consolidation decision (docs/plans/2026-04-23-001-feat-gtm-source-port-plan.md).
# `dee-data-ops-prod` + `dee-data-ops` are decommissioned at U14.
#
# Schema routing behavior is driven by macros/generate_schema_name.sql.

dee_data_ops:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID_DEV', 'project-41542e21-470f-4589-96d') }}"
      dataset: "{{ env_var('DBT_SCHEMA', 'dev_david') }}"
      keyfile: "{{ env_var('BQ_KEYFILE_PATH') }}"
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive

    ci:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID_DEV', 'project-41542e21-470f-4589-96d') }}"
      # Per-PR ephemeral schema when set by GH Actions (ci_pr_<num>);
      # falls back to shared "ci" for local runs.
      dataset: "{{ env_var('DBT_CI_SCHEMA', 'ci') }}"
      keyfile: "{{ env_var('BQ_KEYFILE_PATH') }}"
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID_PROD', 'project-41542e21-470f-4589-96d') }}"
      # In prod, models route to staging/warehouse/marts via generate_schema_name.
      # This dataset is the fallback for anything without a +schema: config —
      # keep it at "marts" so the fallback lands in the customer-facing layer.
      dataset: marts
      keyfile: "{{ env_var('BQ_KEYFILE_PATH_PROD') }}"
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive

    # Local-developer-only mirror of `dev` using ADC instead of a keyfile.
    # Use when no consolidated-project SA key is available locally — needs
    # `gcloud auth application-default login` once. Project + dataset still
    # parameterized via env vars so .env overrides Just Work.
    dev_local:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID_DEV', 'project-41542e21-470f-4589-96d') }}"
      dataset: "{{ env_var('DBT_SCHEMA', 'dev_david') }}"
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive

    # Local-developer-only mirror of `ci` using ADC. Driven by the per-PR
    # wrapper at `2-dbt/scripts/local-ci.sh` — set DBT_CI_SCHEMA=ci_pr_<num>.
    ci_local:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID_DEV', 'project-41542e21-470f-4589-96d') }}"
      dataset: "{{ env_var('DBT_CI_SCHEMA', 'ci') }}"
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive
