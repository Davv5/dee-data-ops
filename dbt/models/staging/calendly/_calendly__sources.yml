version: 2

sources:
  - name: raw_calendly
    description: >
      Raw landing zone for Calendly, populated by the Fivetran Calendly
      connector (daily sync). One row per Calendly scheduled event lives in
      `event`; invitee-level data (email, name, cancel URL) lives in
      `event_invitee` keyed by `event_uri`; invitee question responses live in
      `question_and_answer` keyed by `event_invitee_uri`. No joins happen in
      staging — each raw table gets its own 1:1 staging view.
    database: dee-data-ops
    schema: raw_calendly
    config:
      loaded_at_field: _fivetran_synced
      freshness:
        warn_after: {count: 25, period: hour}
        error_after: {count: 48, period: hour}
    tables:
      - name: event
        description: >
          One row per Calendly scheduled event. Load-bearing for Speed-to-Lead
          because a Calendly booking is the start clock (the event time is
          when the lead confirms the call). ~5K rows.
        columns:
          - name: uri
            description: Full Calendly event URI — primary key of the source record.
            tests:
              - not_null
          - name: _fivetran_synced
            description: Wall-clock UTC time Fivetran last synced this row.
            tests:
              - not_null

      - name: event_invitee
        description: >
          One row per invitee on a scheduled event (usually 1:1 with `event`
          for 1:1 calls). Carries `email`, cancellation / no-show / rescheduled
          state, and the Calendly tracking UTMs. Keyed to `event` via
          `event_uri`. Staging model deferred — only `event` is in scope for
          Track C; invitee staging lands when downstream marts need it.

      - name: question_and_answer
        description: >
          One row per custom question answered on an invitee's booking. Carries
          `self_reported_source` when D-DEE asks it as a Calendly custom
          question. Keyed via `event_invitee_uri`. Staging model deferred —
          see note on `event_invitee`.
