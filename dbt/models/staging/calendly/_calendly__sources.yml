version: 2

sources:
  - name: raw_calendly
    description: >
      Raw landing zone for Calendly. Post-U2 (2026-04-23) staging reads from
      the consolidated project's legacy single-blob table
      `Raw.calendly_objects_raw` via a U3 shim â€” staging filters by
      `entity_type IN ('scheduled_events', 'event_invitees', 'event_types')`
      and JSON-decodes `payload_json`.

      The pre-U3 staging unioned a Fivetran source (`raw_calendly.event` /
      `raw_calendly.event_invitee`) with a Cloud Run poller source
      (`raw_calendly.scheduled_events` / `raw_calendly.invitees`). Both
      paths lived in the Merge-owned `dee-data-ops` project and are no
      longer the source of truth on this consolidated project. GTM's
      Cloud Run poller already landed the same data into
      `Raw.calendly_objects_raw` (10,882 fresh rows per U1 preflight Â§7);
      Merge's staging now routes through that shape.

      The Phase-2 per-object tables `raw_calendly.calendly__*_raw` exist on
      this project but are empty (U1 preflight Â§7) â€” scaffolded but no
      writer. U3 treats this as "Phase-2 not landed for Calendly" and uses
      the blob-shim pattern exactly like Stripe / Typeform / Fathom.

      TODO: retire this shim when the Calendly Phase-2 per-object tables
      start landing data (future work â€” not in the U6/U7/U9 Phase-2 slate).
      Freshness: 1h warn / 4h error matches the GTM Cloud Run poller cadence.
    # schema resolves to `Raw` by default; overridden to a frozen snapshot
    # dataset when the U4a `plumbing_parity` target is invoked with
    # `--vars '{raw_schema_override: raw_snapshot_u4a_<date>}'`.
    schema: "{{ var('raw_schema_override', none) or 'Raw' }}"
    config:
      loaded_at_field: ingested_at
      freshness:
        warn_after: {count: 1, period: hour}
        error_after: {count: 4, period: hour}
    tables:
      - name: calendly_objects_raw
        description: >
          GTM-extractor single-blob landing table. One row per Calendly
          object regardless of kind; `entity_type` filters to
          scheduled_events / event_invitees / event_types. `payload_json`
          holds the full Calendly API payload. `parent_id` links invitees
          to their parent scheduled_event.
        columns:
          - name: entity_id
            description: Calendly object UUID (tail of the URI).
            tests:
              - not_null
          - name: entity_type
            description: '`scheduled_events`, `event_invitees`, or `event_types`.'
            tests:
              - not_null
          - name: parent_id
            description: >
              Parent UUID â€” for event_invitees, the parent scheduled_event.
              Null for scheduled_events + event_types.
          - name: ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column â€” full Calendly API payload.
            tests:
              - not_null
