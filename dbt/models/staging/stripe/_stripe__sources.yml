version: 2

sources:
  - name: raw_stripe
    description: >
      Raw landing zone for Stripe. Post-U2 (2026-04-23) staging reads from
      the consolidated project's legacy single-blob table
      `Raw.stripe_objects_raw` via a U3 shim — each downstream staging model
      filters by `object_type` and JSON-decodes `payload_json`. Fivetran
      `raw_stripe.{charge,customer,...}` is no longer the source of truth on
      this project.

      TODO: retire this shim when `raw_stripe.stripe__<object>_raw` per-object
      tables are populated (U7 Phase-2 Stripe upgrade). The U3 shim and the
      U7 per-object tables share the same downstream column contract, so the
      swap is a source-yaml + source-CTE change only.

      Freshness note: Stripe raw is known ~50 days stale as of U1 preflight
      (stripe-backfill Cloud Run Job failing daily; preflight §10). Tracked
      separately; not a U3 shim concern.
    # schema resolves to `Raw` by default; overridden to a frozen snapshot
    # dataset when the U4a `plumbing_parity` target is invoked with
    # `--vars '{raw_schema_override: raw_snapshot_u4a_<date>}'`.
    schema: "{{ var('raw_schema_override', none) or 'Raw' }}"
    config:
      loaded_at_field: ingested_at
      freshness:
        warn_after: {count: 72, period: hour}
    tables:
      - name: stripe_objects_raw
        description: >
          GTM-extractor single-blob landing table. One row per Stripe object
          regardless of type; `object_type` column filters to charges /
          customers / invoices / etc. `payload_json` holds the full Stripe
          object as returned by the Stripe API. Seen object_types in U1
          preflight §10: charges, balance_transactions, invoices, customers,
          subscriptions, products, prices, refunds, disputes.
        columns:
          - name: object_id
            description: Stripe object id. Equal to `payload_json.id`.
            tests:
              - not_null
          - name: object_type
            description: Stripe object type (e.g. `charges`, `customers`).
            tests:
              - not_null
          - name: ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full Stripe object payload.
            tests:
              - not_null
