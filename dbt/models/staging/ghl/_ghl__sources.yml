version: 2

sources:
  - name: ghl
    description: >
      Raw landing zone for GoHighLevel v2 API data. Post-U2 (2026-04-23)
      staging reads from the consolidated project's Phase-2 per-object
      tables in `raw_ghl.ghl__<obj>_raw`. These tables are populated by
      GTM's `bq-ingest` Cloud Run service + `ghl-incremental-v2` Cloud Run
      Job.

      Column-rename shim (U3): the Phase-2 tables use columns
      `(entity_id, _ingested_at, payload_json, location_id, partition_date,
      event_ts, updated_at_ts, source, backfill_run_id, is_backfill)`.
      Merge's staging models expect `(id, _ingested_at, payload)`. The
      column-rename happens in each staging model's `source` CTE; this
      YAML routes the physical table name via per-table `identifier:`
      overrides so source(...) calls in SQL stay unchanged.

      Row-coverage gaps from U1 preflight §7:
        - contacts:            15,888 rows (healthy)
        - opportunities:       25,959 rows (healthy)
        - pipelines:           36 rows    (healthy)
        - conversations:       101 rows   (GAP — 1,314 in legacy blob)
        - messages:            0          (GAP — not in blob either)
        - users:               0          (GAP — not in blob either)
        - outbound_call_logs:  100 rows   (low, not staged today)

      The conversations / messages / users gaps flow into staging as
      reduced row counts. They may break U4a plumbing parity against a
      frozen `dee-data-ops-prod` baseline; if so, swap conversations to a
      blob-shim against `Raw.ghl_objects_raw` (1,314 rows) and accept
      messages/users as empty (no upstream source has them right now).
      Diagnosis belongs to U4a, not U3.

      U4a update (2026-04-24): U3's `ghl-messages-missing` gap was traced
      to (a) a wrong-path container entrypoint on GTM's `ghl-comprehensive-
      backfill` Cloud Run Job, (b) a missing `conversations/message.readonly`
      PIT scope + stale token in Secret Manager, and (c) a nested-envelope
      bug in `ingest/sources/ghl/backfill_comprehensive.py::_fetch_messages`.
      After all three fixes, `raw_ghl.ghl__messages_raw` populates — but
      `fct_outreach` still dropped ~95% of touches in its inner join to
      conversations because `raw_ghl.ghl__conversations_raw` only holds the
      101 Phase-2 rows. Fix: swap `conversations` to a blob-shim against
      `Raw.ghl_objects_raw` filtered on entity_type='conversations' — the
      legacy path that holds 1,314 rows matching the parent universe we
      fetched messages for. Implemented via the `ghl_blob` source below.
    # schema resolves to `raw_ghl` by default; overridden to a frozen snapshot
    # dataset when the U4a `plumbing_parity` target is invoked with
    # `--vars '{raw_schema_override: raw_snapshot_u4a_<date>}'`.
    schema: "{{ var('raw_schema_override', none) or 'raw_ghl' }}"
    config:
      loaded_at_field: _ingested_at
    tables:
      - name: users
        identifier: ghl__users_raw
        description: >
          One row per GHL user (agency + account scope). ~16 rows expected;
          0 rows present in `raw_ghl.ghl__users_raw` as of U1 preflight —
          scheduler path is not populating this entity_type on either the
          per-object or legacy blob table. Staging passes zero rows through
          until upstream fix.
        columns:
          - name: entity_id
            description: GHL user id (primary key of the source record).
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: >
              JSON column — full user object as returned by GHL /users/search.
              Cast to string in staging for downstream compatibility.
            tests:
              - not_null

      - name: opportunities
        identifier: ghl__opportunities_raw
        description: >
          One row per GHL opportunity. The "booked call" denominator for the
          headline Speed-to-Lead metric comes from this table (stage = booked).
          ~26K rows across 20+ pipelines.
        config:
          freshness:
            warn_after: {count: 36, period: hour}
            error_after: {count: 48, period: hour}
        columns:
          - name: entity_id
            description: GHL opportunity id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full opportunity object.
            tests:
              - not_null

      - name: conversations
        identifier: ghl__conversations_raw
        description: >
          One row per GHL conversation (a contact-level thread spanning CALL /
          SMS / EMAIL). The "first outbound human SDR touch" numerator for the
          headline metric comes from this table, using `lastManualMessageDate`
          (human-originated) vs `lastMessageDate` (includes workflow automation)
          to exclude workflow touches. Expected ~15K rows; **101 rows present**
          in `raw_ghl.ghl__conversations_raw` as of U1 preflight §7 (vs 1,314
          in `Raw.ghl_objects_raw`). U4a parity will surface whether this gap
          is acceptable or the staging should shim from the blob.
        config:
          freshness:
            warn_after: {count: 36, period: hour}
            error_after: {count: 48, period: hour}
        columns:
          - name: entity_id
            description: GHL conversation id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full conversation object.
            tests:
              - not_null

      - name: contacts
        identifier: ghl__contacts_raw
        description: One row per GHL contact (the lead-level entity). ~15.8K rows.
        columns:
          - name: entity_id
            description: GHL contact id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full contact object.
            tests:
              - not_null

      - name: messages
        identifier: ghl__messages_raw
        description: >
          One row per GHL message, fanned out from `conversations` via
          `/conversations/{id}/messages`. Per-touch SDR attribution lives here
          (`userId`). **0 rows** present in either `raw_ghl.ghl__messages_raw`
          or `Raw.ghl_objects_raw` as of U1 preflight — the upstream
          extraction path for messages is not landing anywhere. Staging
          passes zero rows through until upstream fix (not in U3 scope).
        config:
          freshness:
            warn_after: {count: 36, period: hour}
            error_after: {count: 48, period: hour}
        columns:
          - name: entity_id
            description: GHL message id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full message object.
            tests:
              - not_null

      - name: pipelines
        identifier: ghl__pipelines_raw
        description: >
          One row per GHL pipeline (with nested `stages` array in payload).
          Resolves opaque `pipelineStageId` on opportunities into human-readable
          stage names; also powers the lead-magnet performance panel. ~36 rows.
        columns:
          - name: entity_id
            description: GHL pipeline id.
            tests:
              - not_null
          - name: _ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full pipeline object (including nested stages).
            tests:
              - not_null

  # U4a blob-shim source (2026-04-24) — points at the legacy single-table
  # `Raw.ghl_objects_raw` for the entity types where Phase-2 per-object
  # tables hold fewer rows than the blob (currently: conversations, 101 vs
  # 1,314). Retire when `ghl-incremental-v2` catches up and the per-object
  # tables match the blob's coverage.
  - name: ghl_blob
    description: >
      Legacy blob landing for GHL. Single table (`Raw.ghl_objects_raw`)
      keyed on `(entity_type, entity_id)` with `payload_json` carrying the
      full API object. Used today by `stg_ghl__conversations` only, to
      bypass the Phase-2 coverage gap (raw_ghl has 101 of 1,314 convos).
    # Under `plumbing_parity` with `--vars raw_schema_override=<snapshot>`,
    # this resolves to the snapshot dataset; otherwise it points at the
    # live `Raw` dataset in the consolidated project.
    schema: "{{ var('raw_schema_override', none) or 'Raw' }}"
    config:
      loaded_at_field: ingested_at
    tables:
      - name: ghl_objects_raw
        identifier: ghl_objects_raw
        description: >
          One row per GHL object (any entity_type). Staging models filter on
          `entity_type = '<name>'` and normalize columns to the per-object
          shape expected downstream.
