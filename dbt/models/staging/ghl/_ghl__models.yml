version: 2

models:
  - name: stg_ghl__users
    description: >
      1:1 staging view on `raw_ghl.users`. Deduped on `id` keeping the latest
      `_ingested_at`. Flattens the JSON payload into typed columns; no joins.
      SDR/AE role attribution happens downstream in `dim_sdrs` via the
      `ghl_sdr_roster` seed — GHL's native `roles.type` / `roles.role` fields
      are agency/account × user/admin, which is orthogonal to SDR/AE.
    columns:
      - name: user_id
        description: GHL user id. Primary key.
        tests:
          - unique
          - not_null

      - name: email
        description: User's email address.
        tests:
          - not_null

      - name: full_name
        description: Display name as stored in GHL (`name` field of the payload).

      - name: first_name
        description: First name.

      - name: last_name
        description: Last name.

      - name: phone
        description: E.164-formatted phone number, as stored in GHL.

      - name: ghl_account_type
        description: >
          `roles.type` from GHL — either `agency` (users with cross-location
          reach) or `account` (users scoped to this location only). Orthogonal
          to SDR/AE; used for traceability, not metric logic.

      - name: ghl_role
        description: >
          `roles.role` from GHL — either `user` or `admin`. Orthogonal to
          SDR/AE; used for traceability, not metric logic.

      - name: is_deleted
        description: True if the GHL user has been soft-deleted.

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.

  - name: stg_ghl__opportunities
    description: >
      1:1 staging view on `raw_ghl.opportunities`. Deduped on `id` keeping the
      latest `_ingested_at`. Flattens the JSON payload into typed scalar
      columns; no joins, no nested arrays (customFields, relations, followers,
      attributions, and the embedded `contact` object are deliberately dropped
      — the embedded contact is re-derivable via `contact_id` → stg_ghl__contacts).
      This is the denominator source for the headline Speed-to-Lead metric:
      filter on `pipeline_stage_id` = the "booked" stage (TBD, pending config
      inspection) and use `last_stage_change_at` as the booking event timestamp.
    columns:
      - name: opportunity_id
        description: GHL opportunity id. Primary key.
        tests:
          - unique
          - not_null

      - name: opportunity_name
        description: Display name of the opportunity (typically the contact's full name).

      - name: status
        description: >
          Opportunity lifecycle status. `lost` is part of the DQ exclusion
          filter for the Speed-to-Lead metric per the locked scope.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['open', 'won', 'lost', 'abandoned']

      - name: lead_source
        description: >
          Free-text source attribution as recorded in GHL (`source` field) —
          e.g., "IG", "FB Form". Not a controlled vocabulary.

      - name: pipeline_id
        description: GHL pipeline the opportunity lives in. 20+ pipelines configured at D-DEE.

      - name: pipeline_stage_id
        description: >
          Current stage within the pipeline. The "booked" stage id(s) are the
          filter for the headline metric denominator — specific value(s) TBD
          from pipeline config inspection with David.
        tests:
          - not_null

      - name: contact_id
        description: FK to stg_ghl__contacts (the lead-level entity).
        tests:
          - not_null

      - name: assigned_user_id
        description: >
          FK to stg_ghl__users — the GHL user currently assigned to the
          opportunity. Mostly null at D-DEE (~99.8%); SDR/AE identity for the
          metric comes from conversations.assignedTo, not opportunities.

      - name: location_id
        description: GHL location (tenant) the opportunity belongs to.

      - name: lost_reason_id
        description: FK to GHL's lost-reason taxonomy. Populated only when status = 'lost'.

      - name: monetary_value
        description: Dollar value attached to the opportunity (numeric; 0 when unset).

      - name: forecast_probability
        description: Manually-set forecast probability (nullable).

      - name: effective_probability
        description: GHL-computed effective probability (0-100).

      - name: opportunity_created_at
        description: When the opportunity was created in GHL.
        tests:
          - not_null

      - name: opportunity_updated_at
        description: When the opportunity row was last touched in GHL.

      - name: last_status_change_at
        description: When `status` last transitioned (open → won/lost/abandoned).

      - name: last_stage_change_at
        description: >
          When `pipeline_stage_id` last transitioned. This is the booking-event
          timestamp for the Speed-to-Lead metric (paired with the booked-stage
          filter on `pipeline_stage_id`).
        tests:
          - not_null

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.

  - name: stg_ghl__contacts
    description: >
      1:1 staging view on `raw_ghl.contacts`. Deduped on `id` keeping the
      latest `_ingested_at`. Flattens the JSON payload into typed scalar
      columns; nested arrays (tags, customFields, followers, additionalEmails,
      attributions) are deliberately dropped — staging is flat, and these can
      be re-exploded downstream if a mart needs them. Contacts are the
      lead-level entity: `opportunity.contact_id` and `conversation.contactId`
      both FK here. Load-bearing for the Speed-to-Lead DQ filter: contacts
      with null `phone` are excluded from the metric per the locked scope.
    columns:
      - name: contact_id
        description: GHL contact id. Primary key.
        tests:
          - unique
          - not_null

      - name: location_id
        description: GHL location (tenant) the contact belongs to.

      - name: assigned_user_id
        description: >
          FK to stg_ghl__users — the GHL user currently assigned to the
          contact (nullable). Not used for SDR/AE attribution on the
          Speed-to-Lead metric; that comes from conversations.assignedTo.

      - name: business_id
        description: FK to GHL's business-unit taxonomy (nullable).

      - name: contact_name
        description: Display name as stored in GHL (`contactName` field).

      - name: first_name
        description: First name (lowercased / normalized by GHL).

      - name: last_name
        description: Last name (lowercased / normalized by GHL).

      - name: first_name_raw
        description: First name as originally submitted (preserves casing).

      - name: last_name_raw
        description: Last name as originally submitted (preserves casing).

      - name: company_name
        description: Contact's company affiliation, if provided.

      - name: email
        description: Email address, as stored in GHL.

      - name: phone
        description: >
          E.164-formatted phone number. Null phones are part of the DQ
          exclusion filter for the Speed-to-Lead metric per the locked scope.

      - name: contact_type
        description: >
          GHL contact classification (`type` field) — e.g., `lead`, `customer`.
          Free-text; not a controlled vocabulary enforced at source.

      - name: lead_source
        description: >
          Free-text source attribution as recorded in GHL (`source` field) —
          e.g., "IG DBB Manu Comm Templates", "FB Form". Not normalized.

      - name: is_dnd
        description: >
          True if the contact has a do-not-disturb flag set in GHL. Per the
          locked scope, `dnd` is NOT a filter for the Speed-to-Lead metric.

      - name: city
        description: City, as stored in GHL.

      - name: state
        description: State / region, as stored in GHL.

      - name: postal_code
        description: Postal / ZIP code, as stored in GHL.

      - name: address1
        description: Street address line 1.

      - name: country
        description: ISO country code (e.g., "US"), as stored in GHL.

      - name: timezone
        description: IANA timezone string (e.g., "America/Los_Angeles").

      - name: website
        description: Contact's website URL, if provided.

      - name: date_of_birth
        description: Contact's date of birth, if provided.

      - name: contact_created_at
        description: When the contact was first created in GHL.
        tests:
          - not_null

      - name: contact_updated_at
        description: When the contact row was last touched in GHL.

      - name: _ingested_at
        description: Wall-clock UTC time the underlying raw row was written into BigQuery.
