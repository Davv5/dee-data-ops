version: 2

sources:
  - name: raw_typeform
    description: >
      Raw landing zone for Typeform. Post-U2 (2026-04-23) staging reads from
      the consolidated project's legacy single-blob table
      `Raw.typeform_objects_raw` via a U3 shim — staging filters by
      `entity_type = 'responses'` (or `'forms'`) and JSON-decodes
      `payload_json`. Fivetran `raw_typeform.{response,response_answer,form}`
      is no longer the source of truth on this project.

      TODO: retire this shim when `raw_typeform.typeform__<entity>_raw`
      per-object tables are populated (U9 Phase-2 Typeform upgrade).

      Gap surfaced in U3: the GTM extractor does not currently persist a
      `form_id` top-level column or embed it in `payload_json` for
      `entity_type='responses'`. The response → form linkage is lost in the
      blob. Staging emits `form_id AS NULL` with a TODO; the real fix is the
      U9 extractor rewrite (either extract from the API request path or add
      a `parent_id`/`form_id` column to the landing table).
    # schema resolves to `Raw` by default; overridden to a frozen snapshot
    # dataset when the U4a `plumbing_parity` target is invoked with
    # `--vars '{raw_schema_override: raw_snapshot_u4a_<date>}'`.
    schema: "{{ var('raw_schema_override', none) or 'Raw' }}"
    config:
      loaded_at_field: ingested_at
      freshness:
        warn_after: {count: 25, period: hour}
        error_after: {count: 48, period: hour}
    tables:
      - name: typeform_objects_raw
        description: >
          GTM-extractor single-blob landing table. One row per Typeform
          object regardless of kind; `entity_type` column filters to
          responses / forms. `payload_json` holds the full Typeform object
          as returned by the Typeform API (Responses API for responses,
          Forms API for forms).
        columns:
          - name: entity_id
            description: Typeform object id. For responses, equal to the response token.
            tests:
              - not_null
          - name: entity_type
            description: '`responses` or `forms`.'
            tests:
              - not_null
          - name: ingested_at
            description: Wall-clock UTC time this row was written into BigQuery.
            tests:
              - not_null
          - name: payload_json
            description: JSON column — full Typeform API payload.
            tests:
              - not_null
