version: 2

models:
  - name: dim_pipeline_stages
    description: >
      One row per (pipeline, stage) pair â€” flattens the nested `stages`
      array from `stg_ghl__pipelines` into a flat dim. Carries the
      metric-critical `is_booked_stage` boolean so downstream facts and
      marts can surface the GHL-native "booked" attribute on any row
      without re-deriving it. See `_dimensions__docs.md` for the
      is_booked_stage rule set.

      **Grain note:** `is_booked_stage` is a dim *attribute* â€” a
      downstream descriptor of what a pipeline stage means. It is NOT
      the grain of the Speed-to-Lead denominator. The denominator grain
      is Calendly event (one row per booking in `fct_calls_booked`);
      `dim_pipeline_stages` sits alongside that fact, not replacing it.
      See `CLAUDE.local.md` "Locked metric" table for the full rationale.
    columns:
      - name: pipeline_stage_sk
        description: >
          Surrogate key over `(pipeline_id, stage_id)`. Use this for
          fact-to-dim joins; `pipeline_id`/`stage_id` are retained for
          traceability.
        tests:
          - unique
          - not_null

      - name: pipeline_id
        description: FK to `stg_ghl__pipelines.pipeline_id`. GHL pipeline the stage belongs to.
        tests:
          - not_null

      - name: pipeline_name
        description: Display name of the pipeline (denormalized onto every stage row).

      - name: stage_id
        description: >
          GHL's native stage id (the value `opportunities.pipelineStageId`
          points at). Unique within a pipeline.
        tests:
          - not_null

      - name: stage_name
        description: Display name of the stage (e.g. `Booked`, `Set/Triage`, `Disposition`).

      - name: stage_position
        description: Integer ordering of this stage within its pipeline (0-indexed, per GHL).

      - name: is_booked_stage
        description: >
          True if this stage represents a booked-call state in GHL. Rule:
          `stage_name` contains `booked` (case-insensitive) OR
          `stage_name IN ('Set', 'Set/Triage', 'Call Booked', 'Booked Call')`.
          Rule validated against the oracle Revenue-by-Stage tab (2026-04-20
          corpus audit). This is a GHL-native attribute surfaced on rows â€”
          not the Speed-to-Lead metric denominator grain (that is Calendly).

      - name: show_in_funnel
        description: >
          Denormalized from the parent pipeline â€” whether the owning
          pipeline renders in GHL's funnel UI. Kept at stage grain so
          downstream filters don't have to rejoin pipelines.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - pipeline_id
            - stage_id

  - name: dim_contacts
    description: >
      Golden-contact dimension anchored on GHL (`stg_ghl__contacts`).
      Surrogate key over `(location_id, contact_id)`; carries the
      `attribution_era` bucket (`utm` / `pre_utm`) that downstream marts
      use to gate era-aware joins, plus placeholder psychographic columns
      reserved for the Typeform-answers pivot model when it ships. One
      row per GHL contact â€” the v1 identity spine. Per `.claude/rules/
      warehouse.md`, multi-source bridges land upstream of the dim, not
      by widening the PK.
    columns:
      - name: contact_sk
        description: Surrogate key over `(location_id, contact_id)`. FK target.
        tests:
          - unique
          - not_null
      - name: contact_id
        description: Native GHL contact id. Natural key.
        tests:
          - not_null
      - name: location_id
        description: GHL location id. Composite with `contact_id` in the SK.
        tests:
          - not_null
      - name: email
        description: Raw GHL email.
      - name: email_norm
        description: Lowercased / trimmed email â€” canonical join key for bridges.
      - name: attribution_era
        description: >
          `utm` when `lead_source` matches a paid/tracked pattern;
          otherwise `pre_utm`. Per-contact, not per-campaign â€” drives
          era-aware mart joins.
        tests:
          - not_null
          - accepted_values:
              values: ['utm', 'pre_utm']
      - name: has_typeform_utm
        description: >
          True when the Typeform-join yielded a response carrying any
          `hidden_utm_*` value. Placeholder today (Typeform email-join
          bridge still owed); shape preserved for drop-in.

  - name: dim_users
    description: >
      Unified users dim â€” supersedes the previously-planned split
      `dim_sdrs` + `dim_aes`. From `stg_ghl__users` left-joined with
      `ghl_sdr_roster` to attach the human-maintained `role` column.
      Per Track D's grain-audit decision, SDR filtering moves to the
      mart layer, so this dim is reusable for any downstream cut
      (SDR / AE / Closer). Dual-role history is tracked via
      `dim_users_snapshot` (SCD2, check strategy on `role` + `email`).
    columns:
      - name: user_sk
        description: Surrogate key over `user_id`. FK target in fct_outreach.
        tests:
          - unique
          - not_null
      - name: user_id
        description: Native GHL user id. Natural key. Joins to the roster seed.
        tests:
          - unique
          - not_null
      - name: email
        description: GHL user email.
      - name: role
        description: >
          `sdr`, `ae`, or `unknown`. Source: `ghl_sdr_roster.csv`. Users
          not in the roster default to `unknown`. Role history preserved
          by `dim_users_snapshot`.
        tests:
          - not_null
          - accepted_values:
              values: ['SDR', 'Setter', 'Triager', 'DM_Setter', 'Closer', 'Owner', 'unknown']
      - name: is_active
        description: >
          `not is_deleted` from GHL. True when the user currently exists
          in the GHL users endpoint and is not soft-deleted.
        tests:
          - not_null

  - name: dim_offers
    description: >
      D-DEE v1 offer stack. Hand-coded inline (not a seed) because the
      list is tiny and ships with the repo, not a source-system export.
      One row per SKU. Extend this model when the offer list changes.
    columns:
      - name: offer_sk
        description: Surrogate key over `offer_id`.
        tests:
          - unique
          - not_null
      - name: offer_id
        description: Business-friendly offer identifier (e.g. `OFFER_DDEE_CORE`).
        tests:
          - unique
          - not_null
      - name: offer_name
        description: Display name shown in marts / dashboards.
        tests:
          - not_null
      - name: product_type
        description: Product category (e.g. `coaching`).
      - name: offer_tier
        description: Price tier label (e.g. `high_ticket`).

  - name: dim_calendar_dates
    description: >
      Standard calendar dimension from
      `dbt_utils.date_spine(start_date='2024-01-01', end_date=current_date+1)`.
      One row per day with day/week/month/quarter/year enrichment for
      date-bucketed mart joins and Looker Studio filters.
    columns:
      - name: date_sk
        description: Surrogate key over `date_day`.
        tests:
          - unique
          - not_null
      - name: date_day
        description: The calendar date (UTC). Natural key.
        tests:
          - unique
          - not_null
      - name: year_number
        description: Four-digit year.
      - name: quarter_number
        description: Calendar quarter (1-4).
      - name: month_number
        description: Calendar month (1-12).
      - name: week_number
        description: ISO-ish week-of-year.
      - name: is_weekday
        description: True Mon-Fri; false Sat/Sun.
