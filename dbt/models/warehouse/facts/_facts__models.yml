version: 2

models:
  - name: fct_calls_booked
    description: >
      Grain: one row per Calendly booking event — the Speed-to-Lead
      denominator source. Source: `stg_calendly__events`. Today
      `contact_sk`, `assigned_user_sk`, and `pipeline_stage_sk` resolve
      to NULL: the invitee-email axis (required for GHL contact join)
      lives in a sibling Calendly table not yet in staging — see
      Track C open threads. Columns retain the contract so the mart
      layer can compile today; backfill happens at invitee-staging
      drop-in, not by changing the fact shape.
    columns:
      - name: booking_sk
        description: Surrogate key over Calendly `event_id`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable pending invitee staging.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: assigned_user_sk
        description: FK to `dim_users.user_sk`. Nullable — resolved via GHL opportunity, not Calendly.
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_sk
      - name: pipeline_stage_sk
        description: FK to `dim_pipeline_stages.pipeline_stage_sk`. Nullable.
        tests:
          - relationships:
              to: ref('dim_pipeline_stages')
              field: pipeline_stage_sk
      - name: calendly_event_id
        description: Raw Calendly event id (`uri`). Natural key for traceability.
        tests:
          - not_null
      - name: booked_at
        description: >
          UTC timestamp the invitee confirmed the slot. Speed-to-Lead
          start clock.
        tests:
          - not_null
      - name: scheduled_for
        description: UTC timestamp the meeting is / was scheduled to start.
      - name: event_status
        description: Calendly event status (`active`, `canceled`, …).
      - name: cancelled_at
        description: UTC timestamp of cancellation when `event_status` is cancelled.

  - name: fct_outreach
    description: >
      Grain: one row per outbound human CALL/SMS. Source:
      `stg_ghl__messages` filtered to outbound CALL/SMS and joined to
      `stg_ghl__conversations` to require a non-null
      `last_manual_message_at` (excludes automation). No role filter —
      per Track D the SDR filter moves to the mart so this fact is
      reusable across SDR / AE / Closer cuts.
    columns:
      - name: touch_sk
        description: Surrogate key over `message_id`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`.
        tests:
          - not_null
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: user_sk
        description: FK to `dim_users.user_sk`. The rep who made the touch.
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_sk
      - name: message_id
        description: GHL message id. Natural key for traceability.
        tests:
          - unique
          - not_null
      - name: touched_at
        description: UTC timestamp the outbound touch was sent (`sent_at`).
        tests:
          - not_null
      - name: channel
        description: >
          `call` when source `message_type = 'TYPE_CALL'`; `sms` when
          `TYPE_SMS`. No other values possible post-filter.
        tests:
          - not_null
          - accepted_values:
              values: ['call', 'sms']
      - name: match_method
        description: >
          Always `ghl_native` — messages carry `contact_id`/`user_id`
          directly from GHL, so no matching heuristic is needed.
        tests:
          - accepted_values:
              values: ['ghl_native']
      - name: match_score
        description: Always 1.00 (GHL-native join).

  - name: fct_revenue
    description: >
      Grain: one row per payment event, unioned across Stripe and
      Fanbasis. Fanbasis side is a zero-row structural placeholder until
      the extractor ships (Week-0 credentials still pending).
      Contact attribution flows through
      `bridge_identity_contact_payment`; `contact_sk` is nullable when
      the bridge returns `unmatched`.
    columns:
      - name: payment_sk
        description: Surrogate key over `(source_platform, payment_id)`.
        tests:
          - unique
          - not_null
      - name: contact_sk
        description: FK to `dim_contacts.contact_sk`. Nullable when unmatched.
        tests:
          - relationships:
              to: ref('dim_contacts')
              field: contact_sk
      - name: payment_id
        description: Native payment id (Stripe `charge_id` today).
        tests:
          - not_null
      - name: source_platform
        description: Source of the payment (`stripe` / `fanbasis`).
        tests:
          - not_null
          - accepted_values:
              values: ['stripe', 'fanbasis']
      - name: transaction_date
        description: UTC timestamp of the payment.
        tests:
          - not_null
      - name: gross_amount
        description: Gross amount in major units (e.g. USD). Charge amount before refunds.
      - name: net_amount
        description: Net amount in major units — captured minus refunded.
      - name: currency
        description: ISO 4217 currency code.
      - name: product
        description: Free-text product description from the payment.
      - name: payment_method
        description: Channel metadata from the source (e.g. Stripe `outcome_network_status`).
      - name: card_issue_country
        description: ISO country code from billing address.
      - name: match_method
        description: Tier used by the bridge (`email_exact` / `email_canonical` / `phone_last10` / `billing_email_direct` / `unmatched`).
        tests:
          - not_null
          - accepted_values:
              values:
                - email_exact
                - email_canonical
                - phone_last10
                - billing_email_direct
                - unmatched
      - name: match_score
        description: Confidence score attached to the chosen tier (0.00-1.00).
      - name: bridge_status
        description: Summary flag — `matched` / `ambiguous_multi_candidate` / `unmatched`.
        tests:
          - not_null
          - accepted_values:
              values:
                - matched
                - ambiguous_multi_candidate
                - unmatched
