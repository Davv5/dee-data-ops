version: 2

models:
  - name: revenue_detail
    description: |
      {{ doc("revenue_detail") }}
    columns:
      - name: payment_id
        description: |
          Source-system payment identifier (Stripe charge_id or Fanbasis
          equivalent). Primary key of the mart — every payment appears exactly
          once, including unmatched payments.
        tests:
          - unique
          - not_null

      - name: source_platform
        description: Payment processor — `stripe` or `fanbasis`.
        tests:
          - not_null
          - accepted_values:
              values: ['stripe', 'fanbasis']

      - name: transaction_date
        description: Timestamp the payment was captured, in UTC.
        tests:
          - not_null

      - name: gross_amount
        description: Gross payment amount before fees/refunds, in `currency`.

      - name: net_amount
        description: |
          Net payment amount after processor fees/refunds, in `currency`. This
          is the column summed for revenue parity against the oracle.
        tests:
          - not_null

      - name: currency
        description: ISO-4217 currency code (uppercase).
        tests:
          - not_null

      - name: product
        description: Product / offer name if the payment carries it; nullable.

      - name: contact_sk
        description: |
          Surrogate key into `dim_contacts`. NULL when the payment could not
          be matched to a contact — those rows stay in the mart so the
          unmatched-revenue tile on Page 3 of the dashboard is honest.

      - name: contact_email_if_matched
        description: |
          Email from `dim_contacts` for matched payments. NULL for unmatched.

      - name: match_method
        description: |
          How the payment was linked to a contact. Enum:
          `email_exact | email_canonical | phone_last10 |
          billing_email_direct | unmatched`.
        tests:
          - not_null
          - accepted_values:
              values:
                - email_exact
                - email_canonical
                - phone_last10
                - billing_email_direct
                - unmatched

      - name: match_score
        description: |
          Confidence score from the identity bridge, 0.0–1.0. 1.0 is exact
          match; unmatched rows carry 0.0.

      - name: match_status
        description: |
          Bridge-level status carried through from
          `bridge_identity_contact_payment`. Enum:
          `matched | ambiguous_multi_candidate | unmatched`.
        tests:
          - not_null
          - accepted_values:
              values:
                - matched
                - ambiguous_multi_candidate
                - unmatched

      - name: payment_method
        description: |
          Payment method from the processor (e.g. `card`, `us_bank_account`).

      - name: card_issue_country
        description: |
          ISO-3166 country the payment card was issued in. Nullable for
          non-card payment methods and for payments where the processor did
          not return a country.

      - name: is_international_card
        description: |
          Boolean: true when `card_issue_country` is populated and not `US`.
          NULL when the country is unknown — explicit three-valued logic so
          downstream consumers don't accidentally bucket unknown as
          domestic.

      - name: first_touch_campaign
        description: |
          First-touch campaign from `dim_contacts`. Only populated for
          payments matched to a contact.

      - name: first_touch_source
        description: First-touch marketing source; matched payments only.

      - name: first_touch_medium
        description: First-touch marketing medium; matched payments only.

      - name: last_touch_campaign
        description: Last-touch campaign; matched payments only.

      - name: last_touch_source
        description: Last-touch marketing source; matched payments only.

      - name: lead_magnet_first_engaged
        description: |
          First lead magnet the contact engaged with, from `dim_contacts`.
          Matched payments only.

      - name: closer_name
        description: |
          Latest Closer assigned to the contact (resolved via most recently
          updated opportunity). NULL when the contact has no Closer-role
          opportunity yet.

      - name: closer_role
        description: |
          User role from `dim_users`. Constrained to `Closer` in the join —
          present when `closer_name` is present.

      - name: attribution_quality_flag
        description: |
          DQ bucket for the payment. Enum:
          `clean | unmatched | ambiguous_contact_match | role_unknown`.
          Every row lands in exactly one bucket.
        tests:
          - not_null
          - accepted_values:
              values:
                - clean
                - unmatched
                - ambiguous_contact_match
                - role_unknown

      - name: mart_refreshed_at
        description: Timestamp the mart was last materialized, in UTC.
        tests:
          - not_null
