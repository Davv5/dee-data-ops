[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    ".venv",
    # Legacy imperative paths inherited from gtm-lead-warehouse. Lint here is
    # advisory only — these files predate the project's ruff bar and gating
    # cleanup on style fixes blocks more valuable work. Re-evaluate file-by-file.
    "sources",
    "sql",
    "ops",
    "app.py",
    "setup_*.py",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "W",    # pycodestyle warnings
    "B",    # bugbear
    "UP",   # pyupgrade
    "SIM",  # simplify
]
ignore = [
    "E501",  # line-too-long — covered by formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.ruff.lint.isort]
known-first-party = ["ingest"]
